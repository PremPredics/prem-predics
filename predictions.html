<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Predictions</title>
<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
  overflow-x: hidden;
}

header {
  padding: 16px 14px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.42);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.3px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85);
  margin: 0;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

main {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 12px 12px 20px;
}

.toolbar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.toolbar a {
  min-height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 800;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 8px 11px;
  text-align: center;
  white-space: nowrap;
}

.toolbar a.prediction-back-link {
  color: #fff;
  background: linear-gradient(135deg, #0891b2, #22d3ee);
  border-color: rgba(186, 230, 253, 0.78);
  box-shadow: 0 0 14px rgba(34, 211, 238, 0.3);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.72),
    1px -1px 0 rgba(0,0,0,0.72),
    -1px 1px 0 rgba(0,0,0,0.72),
    1px 1px 0 rgba(0,0,0,0.72);
}

.panel {
  max-width: 980px;
  margin: 0 auto;
  background: rgba(46, 16, 102, 0.66);
  border: 2px solid rgba(196, 132, 252, 0.32);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.26);
}

.page-head {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  text-align: center;
}

.page-head h2 {
  margin: 0;
  font-size: clamp(1.55rem, 3.6vw, 2.35rem);
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 0;
  text-shadow:
    -1px -1px 0 rgba(5,1,12,0.96),
    1px -1px 0 rgba(5,1,12,0.96),
    -1px 1px 0 rgba(5,1,12,0.96),
    1px 1px 0 rgba(5,1,12,0.96),
    0 0 14px rgba(216, 180, 254, 0.62);
}

.state-text,
.message {
  color: #ddd6fe;
  line-height: 1.35;
  margin: 0;
  text-align: center;
}

.message {
  min-height: 22px;
  margin-top: 8px;
}

.message[data-type="success"] {
  color: #bbf7d0;
}

.message[data-type="error"] {
  color: #ff1f1f;
  font-weight: 950;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 0 12px rgba(255, 31, 31, 0.72);
}

.fixtures {
  display: grid;
  gap: 5px;
}

.hedge-panel {
  display: grid;
  gap: 9px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 9px;
  background: rgba(21, 128, 61, 0.22);
  border: 1px solid rgba(134, 239, 172, 0.36);
  text-align: center;
}

.hedge-panel h3 {
  margin: 0;
  color: #bbf7d0;
}

.god-panel {
  background: rgba(250, 204, 21, 0.18);
  border-color: rgba(253, 224, 71, 0.42);
}

.god-panel h3,
.super-score-panel h3 {
  color: #fde68a;
}

.super-score-panel {
  background: rgba(14, 165, 233, 0.18);
  border-color: rgba(125, 211, 252, 0.4);
}

.restriction-panel {
  gap: 8px;
  padding: 10px 12px;
  background:
    linear-gradient(90deg, rgba(7, 89, 133, 0.74) 0%, rgba(14, 116, 144, 0.64) 46%, rgba(127, 29, 29, 0.72) 54%, rgba(153, 27, 27, 0.74) 100%),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.16), transparent 48%);
  border: 2px solid rgba(255,255,255,0.36);
  box-shadow: inset 0 0 0 1px rgba(216, 180, 254, 0.12), 0 8px 20px rgba(17, 7, 38, 0.2);
}

.restriction-panel h3 {
  color: #fff;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9),
    0 0 12px rgba(251, 113, 133, 0.62);
}

.prediction-restriction-cards {
  display: flex;
  justify-content: center;
  align-items: flex-start;
  gap: 8px;
  flex-wrap: wrap;
}

.prediction-restriction-card-wrap {
  display: grid;
  gap: 4px;
  justify-items: center;
}

.prediction-restriction-card {
  width: 72px;
  min-height: 92px;
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 6px;
  padding: 8px 6px;
  border-radius: 12px;
  border: 2px solid rgba(254, 202, 202, 0.86);
  background:
    radial-gradient(circle at 32% 24%, rgba(255,255,255,0.24), transparent 24%),
    linear-gradient(135deg, #4c0519 0%, #991b1b 30%, #ef4444 62%, #fb7185 100%);
  color: #fff;
  box-shadow: 0 0 18px rgba(239, 68, 68, 0.42), 0 12px 22px rgba(17, 7, 38, 0.34);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92);
}

.prediction-restriction-card.power-restriction-card {
  border-color: rgba(191, 219, 254, 0.9);
  background:
    radial-gradient(circle at 32% 24%, rgba(255,255,255,0.24), transparent 24%),
    linear-gradient(135deg, #075985 0%, #0284c7 34%, #38bdf8 70%, #bae6fd 100%);
  box-shadow: 0 0 18px rgba(14, 165, 233, 0.42), 0 12px 22px rgba(17, 7, 38, 0.34);
}

.prediction-restriction-card.super-restriction-card {
  border-color: rgba(254, 243, 199, 0.95);
  background:
    radial-gradient(circle at 32% 24%, rgba(255,255,255,0.28), transparent 24%),
    linear-gradient(135deg, #78350f 0%, #d97706 34%, #facc15 70%, #fff7ad 100%);
  box-shadow: 0 0 18px rgba(250, 204, 21, 0.48), 0 12px 22px rgba(17, 7, 38, 0.34);
}

.prediction-restriction-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 24px rgba(255, 47, 47, 0.58), 0 14px 26px rgba(17, 7, 38, 0.42);
}

.prediction-restriction-card-icon {
  display: grid;
  place-items: center;
  width: 30px;
  height: 30px;
  border-radius: 50%;
  background: rgba(127, 29, 29, 0.72);
  border: 1px solid rgba(254, 202, 202, 0.7);
  font-size: 18px;
  line-height: 1;
}

.power-restriction-card .prediction-restriction-card-icon {
  background: rgba(7, 89, 133, 0.72);
  border-color: rgba(191, 219, 254, 0.78);
}

.super-restriction-card .prediction-restriction-card-icon {
  background: rgba(180, 83, 9, 0.74);
  border-color: rgba(254, 243, 199, 0.86);
}

.prediction-restriction-card-name {
  font-size: 9.5px;
  line-height: 1.12;
  font-weight: 950;
}

@media (min-width: 721px) {
  .prediction-restriction-card {
    width: 84px;
    height: 104px;
    min-height: 104px;
    overflow: hidden;
  }

  .prediction-restriction-card-name {
    max-width: 100%;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
}

.prediction-restriction-played-by {
  display: none;
  color: #fff;
  max-width: 94px;
  font-size: 10px;
  font-weight: 900;
  line-height: 1.1;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9);
}

.hedge-controls {
  display: grid;
  grid-template-columns: minmax(180px, 1fr) 46px 14px 46px 112px;
  gap: 8px;
  align-items: center;
}

.scoreline-controls {
  grid-template-columns: minmax(120px, 1fr) 46px 14px 46px 112px;
}

.scoreline-label {
  font-weight: 900;
  color: #e0f2fe;
}

.hedge-controls select {
  min-height: 34px;
  width: 100%;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 7px;
  padding: 6px 8px;
  background: rgba(17, 7, 38, 0.76);
  color: #fff;
  font: 800 13px 'Segoe UI', Arial, sans-serif;
}

.fixture-row {
  display: flex;
  gap: 6px;
  align-items: center;
  min-height: 38px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
  position: relative;
}

.fixture-main {
  display: grid;
  grid-template-columns: minmax(0, 1fr) 42px 12px 42px minmax(0, 1fr);
  gap: 6px;
  align-items: center;
  flex: 1 1 auto;
  width: 100%;
  min-width: 0;
  overflow: hidden;
}

.fixture-row::before {
  display: none;
  content: none;
}

.fixture-flags {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: nowrap;
  flex: 0 0 76px;
  gap: 4px;
  min-width: 0;
  white-space: nowrap;
}

.fixture-gameweek {
  justify-self: center;
  border-radius: 999px;
  padding: 4px 7px;
  background: rgba(17, 7, 38, 0.72);
  border: 1px solid rgba(216, 180, 254, 0.24);
  color: #fde68a;
  font-size: 12px;
  font-weight: 900;
}

.hedge-fixture-row {
  border-color: rgba(125, 211, 252, 0.44);
  background:
    linear-gradient(90deg, rgba(7, 89, 133, 0.24), rgba(17, 7, 38, 0.44) 34%),
    rgba(17, 7, 38, 0.44);
  box-shadow: inset 0 0 0 1px rgba(125, 211, 252, 0.14);
}

.hedge-flags {
  flex-direction: column;
  gap: 5px;
}

.hedge-badge {
  color: #7dd3fc;
  font-size: 11px;
  font-weight: 950;
  line-height: 1;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.88),
    1px -1px 0 rgba(0,0,0,0.88),
    -1px 1px 0 rgba(0,0,0,0.88),
    1px 1px 0 rgba(0,0,0,0.88),
    0 0 10px rgba(125, 211, 252, 0.68);
}

.hedge-picker-main {
  grid-template-columns: minmax(180px, 1fr) 46px 18px 46px;
}

.hedge-empty-main .fixture-team {
  text-align: center;
}

.hedge-fixture-select {
  min-height: 30px;
  width: 100%;
  min-width: 0;
  border: 1px solid rgba(125, 211, 252, 0.48);
  border-radius: 7px;
  padding: 5px 8px;
  background: rgba(17, 7, 38, 0.76);
  color: #fff;
  font: 900 13px 'Segoe UI', Arial, sans-serif;
}

.hedge-save-button {
  min-height: 28px;
  white-space: nowrap;
  padding: 5px 8px;
  border-radius: 999px;
  background: linear-gradient(135deg, #075985, #0284c7 62%, #7dd3fc);
  color: #fff;
  font-size: 11px;
  box-shadow: 0 0 12px rgba(14, 165, 233, 0.34);
}

.curse-marker {
  width: 26px;
  height: 26px;
  min-width: 26px;
  min-height: 26px;
  display: inline-grid;
  place-items: center;
  border: 1px solid rgba(254, 202, 202, 0.82);
  border-radius: 999px;
  padding: 0;
  background:
    radial-gradient(circle at 42% 25%, rgba(254, 226, 226, 0.72), transparent 24%),
    linear-gradient(135deg, #7f1d1d, #dc2626 54%, #fb7185);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95);
  box-shadow: 0 0 14px rgba(239, 68, 68, 0.66), 0 0 26px rgba(249, 115, 22, 0.28);
}

.power-marker,
.super-marker {
  width: 26px;
  height: 26px;
  min-width: 26px;
  min-height: 26px;
  display: inline-grid;
  place-items: center;
  border: 1px solid rgba(191, 219, 254, 0.9);
  border-radius: 999px;
  padding: 0;
  background:
    radial-gradient(circle at 42% 25%, rgba(224, 242, 254, 0.75), transparent 24%),
    linear-gradient(135deg, #075985, #0284c7 54%, #7dd3fc);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95);
  box-shadow: 0 0 14px rgba(14, 165, 233, 0.66), 0 0 26px rgba(125, 211, 252, 0.28);
}

.super-marker {
  border-color: rgba(254, 243, 199, 0.95);
  background:
    radial-gradient(circle at 42% 25%, rgba(254, 243, 199, 0.78), transparent 24%),
    linear-gradient(135deg, #78350f, #d97706 50%, #facc15);
  box-shadow: 0 0 14px rgba(250, 204, 21, 0.72), 0 0 26px rgba(251, 191, 36, 0.32);
}

.power-marker:hover {
  transform: translateY(-1px) scale(1.06);
}

.super-marker:hover {
  transform: translateY(-1px) scale(1.06);
}

.curse-score {
  color: #ff1f1f;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 10px rgba(255, 31, 31, 0.95),
    0 0 20px rgba(249, 115, 22, 0.72);
}

.curse-override-row .score-input {
  opacity: 1;
  color: #ff1f1f;
  border-color: rgba(255, 31, 31, 0.72);
  background: rgba(69, 10, 10, 0.72);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 12px rgba(255, 31, 31, 0.88);
  box-shadow: 0 0 18px rgba(239, 68, 68, 0.28);
}

.curse-override-row {
  border-color: rgba(248, 113, 113, 0.45);
  box-shadow: inset 0 0 0 1px rgba(127, 29, 29, 0.26);
}

.curse-marker:hover {
  transform: translateY(-1px) scale(1.06);
}

.fixture-meta {
  display: flex;
  align-items: center;
  justify-content: end;
  flex: 0 0 132px;
  gap: 6px;
  min-width: 0;
}

.hedge-fixture-meta {
  grid-template-columns: minmax(78px, auto) auto auto;
}

.hedge-picker-row .hedge-fixture-meta {
  grid-template-columns: auto auto;
}

.fixture-effects {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  min-width: 0;
  order: 1;
}

.fixture-lock {
  order: 2;
}

.fixture-lock {
  color: #ddd6fe;
  font-size: 12px;
  font-weight: 800;
  min-width: 92px;
  overflow: visible;
  text-overflow: clip;
  white-space: nowrap;
  text-align: right;
}

.fixture-team {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 900;
  font-size: 14px;
}

.fixture-team.home {
  text-align: right;
}

.fixture-team.away {
  text-align: left;
}

.score-input {
  width: 46px;
  height: 30px;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 7px;
  background: rgba(17, 7, 38, 0.76);
  color: #fff;
  text-align: center;
  font: 900 15px 'Segoe UI', Arial, sans-serif;
}

.score-input:disabled {
  opacity: 0.58;
}

.score-separator {
  text-align: center;
  justify-self: center;
  color: #ddd6fe;
  font-weight: 900;
}

html.capacitor-android .fixture-main {
  grid-template-columns: minmax(0, 1fr) 38px 12px 38px minmax(0, 1fr);
  gap: 4px;
}

html.capacitor-android .fixture-team {
  max-width: 100%;
  white-space: normal;
  line-height: 1.06;
  overflow-wrap: break-word;
  font-size: clamp(10px, 3vw, 13px);
}

html.capacitor-android .score-input {
  width: 38px;
  height: 28px;
  font-size: 14px;
}

.fixture-lock {
  text-align: right;
}

.fixture-lock.remaining {
  color: #86efac;
  text-shadow: 0 0 8px rgba(34, 197, 94, 0.36);
}

.fixture-lock.locked {
  color: #ff1f1f;
  font-size: 15px;
  text-align: center;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 0 10px rgba(255, 31, 31, 0.78);
}

.actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

.actions button[data-save-all] {
  background: linear-gradient(135deg, #075985, #0284c7 62%, #7dd3fc);
  box-shadow: 0 0 14px rgba(14, 165, 233, 0.36);
}

button {
  min-height: 38px;
  border: 0;
  border-radius: 8px;
  padding: 9px 14px;
  background: linear-gradient(135deg, #8b5cf6, #c4b5fd);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.prediction-summary-list {
  display: grid;
  gap: 5px;
}

.summary-row {
  display: grid;
  grid-template-columns: minmax(110px, 1fr) 64px minmax(110px, 1fr) 30px;
  align-items: center;
  min-height: 34px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
}

.summary-fixture-row {
  display: flex;
}

.summary-fixture-main {
  grid-template-columns: minmax(0, 1fr) 42px 12px 42px minmax(0, 1fr);
  width: 100%;
  justify-items: center;
  gap: 6px;
}

.summary-score {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.summary-goal {
  display: inline-grid;
  place-items: center;
  min-width: 28px;
  color: #fff;
  font-size: 17px;
  font-weight: 950;
  line-height: 1;
  text-align: center;
}

.summary-separator {
  color: #ddd6fe;
  font-size: 16px;
}

.summary-status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
}

.summary-row span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 800;
}

.summary-row span:first-child {
  text-align: right;
}

.summary-row strong {
  text-align: center;
  font-size: 17px;
}

.summary-fixture-row .fixture-effects {
  min-height: 26px;
}

.summary-fixture-row .fixture-lock {
  min-width: 0;
}

.summary-row small {
  grid-column: 1 / -1;
  color: #bbf7d0;
  text-align: center;
  font-weight: 900;
}

.summary-row small.summary-cursed-label,
.summary-fixture-row small.summary-cursed-label {
  grid-column: 2;
  color: #ff1f1f;
  text-align: center;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 10px rgba(255, 31, 31, 0.9),
    0 0 18px rgba(249, 115, 22, 0.58);
}

.curse-modal {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  padding: 18px;
  background: rgba(8, 3, 20, 0.54);
  backdrop-filter: blur(7px);
