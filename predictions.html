<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Predictions</title>
<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
  overflow-x: hidden;
}

header {
  padding: 16px 14px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.42);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.3px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85);
  margin: 0;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

main {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 12px 12px 20px;
}

.toolbar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.toolbar a {
  min-height: 36px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 800;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 8px 11px;
  text-align: center;
  white-space: nowrap;
}

.toolbar a.prediction-back-link {
  color: #fff;
  background: linear-gradient(135deg, #0891b2, #22d3ee);
  border-color: rgba(186, 230, 253, 0.78);
  box-shadow: 0 0 14px rgba(34, 211, 238, 0.3);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.72),
    1px -1px 0 rgba(0,0,0,0.72),
    -1px 1px 0 rgba(0,0,0,0.72),
    1px 1px 0 rgba(0,0,0,0.72);
}

.panel {
  max-width: 980px;
  margin: 0 auto;
  background: rgba(46, 16, 102, 0.66);
  border: 2px solid rgba(196, 132, 252, 0.32);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.26);
}

.page-head {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  text-align: center;
}

.page-head h2 {
  margin: 0;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  text-align: center;
}

.state-text,
.message {
  color: #ddd6fe;
  line-height: 1.35;
  margin: 0;
  text-align: center;
}

.message {
  min-height: 22px;
  margin-top: 8px;
}

.message[data-type="success"] {
  color: #bbf7d0;
}

.message[data-type="error"] {
  color: #fecaca;
}

.fixtures {
  display: grid;
  gap: 5px;
}

.hedge-panel {
  display: grid;
  gap: 9px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 9px;
  background: rgba(21, 128, 61, 0.22);
  border: 1px solid rgba(134, 239, 172, 0.36);
  text-align: center;
}

.hedge-panel h3 {
  margin: 0;
  color: #bbf7d0;
}

.god-panel {
  background: rgba(250, 204, 21, 0.18);
  border-color: rgba(253, 224, 71, 0.42);
}

.god-panel h3,
.super-score-panel h3 {
  color: #fde68a;
}

.super-score-panel {
  background: rgba(14, 165, 233, 0.18);
  border-color: rgba(125, 211, 252, 0.4);
}

.restriction-panel {
  gap: 12px;
  background:
    linear-gradient(135deg, rgba(46, 16, 102, 0.72), rgba(17, 7, 38, 0.62)),
    radial-gradient(circle at 50% 0%, rgba(248, 113, 113, 0.18), transparent 52%);
  border: 1px solid rgba(251, 113, 133, 0.52);
  box-shadow: inset 0 0 0 1px rgba(216, 180, 254, 0.08), 0 8px 20px rgba(17, 7, 38, 0.2);
}

.restriction-panel h3 {
  color: #fff;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9),
    0 0 12px rgba(251, 113, 133, 0.62);
}

.prediction-restriction-cards {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 12px;
  flex-wrap: wrap;
}

.prediction-restriction-card-wrap {
  display: grid;
  gap: 6px;
  justify-items: center;
}

.prediction-restriction-card {
  width: 118px;
  min-height: 152px;
  display: grid;
  align-content: center;
  justify-items: center;
  gap: 8px;
  padding: 14px 10px;
  border-radius: 14px;
  border: 2px solid rgba(254, 202, 202, 0.86);
  background:
    radial-gradient(circle at 32% 24%, rgba(255,255,255,0.24), transparent 24%),
    linear-gradient(135deg, #4c0519 0%, #991b1b 30%, #ef4444 62%, #fb7185 100%);
  color: #fff;
  box-shadow: 0 0 18px rgba(239, 68, 68, 0.42), 0 12px 22px rgba(17, 7, 38, 0.34);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92);
}

.prediction-restriction-card:hover {
  transform: translateY(-2px);
  box-shadow: 0 0 24px rgba(255, 47, 47, 0.58), 0 14px 26px rgba(17, 7, 38, 0.42);
}

.prediction-restriction-card-icon {
  display: grid;
  place-items: center;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  background: rgba(127, 29, 29, 0.72);
  border: 1px solid rgba(254, 202, 202, 0.7);
  font-size: 23px;
  line-height: 1;
}

.prediction-restriction-card-name {
  font-size: 13px;
  line-height: 1.12;
  font-weight: 950;
}

.prediction-restriction-played-by {
  color: #fff;
  font-size: 12px;
  font-weight: 900;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9);
}

.hedge-controls {
  display: grid;
  grid-template-columns: minmax(180px, 1fr) 46px 14px 46px 112px;
  gap: 8px;
  align-items: center;
}

.scoreline-controls {
  grid-template-columns: minmax(120px, 1fr) 46px 14px 46px 112px;
}

.scoreline-label {
  font-weight: 900;
  color: #e0f2fe;
}

.hedge-controls select {
  min-height: 34px;
  width: 100%;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 7px;
  padding: 6px 8px;
  background: rgba(17, 7, 38, 0.76);
  color: #fff;
  font: 800 13px 'Segoe UI', Arial, sans-serif;
}

.fixture-row {
  display: grid;
  grid-template-columns: 82px minmax(0, 1fr) 136px;
  gap: 6px;
  align-items: center;
  min-height: 38px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
  position: relative;
}

.fixture-main {
  display: grid;
  grid-template-columns: minmax(110px, 1fr) 46px 18px 46px minmax(110px, 1fr);
  gap: 6px;
  align-items: center;
  justify-self: stretch;
  min-width: 0;
}

.fixture-row::before {
  display: none;
  content: none;
}

.fixture-flags {
  display: flex;
  align-items: center;
  justify-content: center;
  flex-wrap: nowrap;
  gap: 4px;
  min-width: 0;
  white-space: nowrap;
}

.fixture-gameweek {
  justify-self: center;
  border-radius: 999px;
  padding: 4px 7px;
  background: rgba(17, 7, 38, 0.72);
  border: 1px solid rgba(216, 180, 254, 0.24);
  color: #fde68a;
  font-size: 12px;
  font-weight: 900;
}

.curse-marker {
  width: 26px;
  height: 26px;
  min-width: 26px;
  min-height: 26px;
  display: inline-grid;
  place-items: center;
  border: 1px solid rgba(254, 202, 202, 0.82);
  border-radius: 999px;
  padding: 0;
  background:
    radial-gradient(circle at 42% 25%, rgba(254, 226, 226, 0.72), transparent 24%),
    linear-gradient(135deg, #7f1d1d, #dc2626 54%, #fb7185);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95);
  box-shadow: 0 0 14px rgba(239, 68, 68, 0.66), 0 0 26px rgba(249, 115, 22, 0.28);
}

.curse-score {
  color: #ff1f1f;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 10px rgba(255, 31, 31, 0.95),
    0 0 20px rgba(249, 115, 22, 0.72);
}

.curse-override-row .score-input {
  opacity: 1;
  color: #ff1f1f;
  border-color: rgba(255, 31, 31, 0.72);
  background: rgba(69, 10, 10, 0.72);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 12px rgba(255, 31, 31, 0.88);
  box-shadow: 0 0 18px rgba(239, 68, 68, 0.28);
}

.curse-override-row {
  border-color: rgba(248, 113, 113, 0.45);
  box-shadow: inset 0 0 0 1px rgba(127, 29, 29, 0.26);
}

.curse-marker:hover {
  transform: translateY(-1px) scale(1.06);
}

.dice-curse-marker {
  border-color: rgba(253, 230, 138, 0.9);
  background:
    radial-gradient(circle at 35% 30%, rgba(255, 255, 255, 0.82), transparent 22%),
    linear-gradient(135deg, #7f1d1d, #f97316 52%, #facc15);
  color: #fff;
  box-shadow: 0 0 14px rgba(249, 115, 22, 0.72), 0 0 22px rgba(250, 204, 21, 0.3);
  font-size: 12px;
}

.fixture-lock-wrap {
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
  min-width: 0;
  overflow: visible;
}

.fixture-lock-wrap .curse-marker {
  position: absolute;
  right: -9px;
  top: -11px;
  z-index: 2;
}

.fixture-lock {
  color: #ddd6fe;
  font-size: 12px;
  font-weight: 800;
  min-width: 118px;
  overflow: visible;
  text-overflow: clip;
  white-space: nowrap;
  text-align: center;
}

.fixture-team {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 900;
  font-size: 14px;
}

.fixture-team.home {
  text-align: right;
}

.fixture-team.away {
  text-align: left;
}

.score-input {
  width: 46px;
  height: 30px;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 7px;
  background: rgba(17, 7, 38, 0.76);
  color: #fff;
  text-align: center;
  font: 900 15px 'Segoe UI', Arial, sans-serif;
}

.score-input:disabled {
  opacity: 0.58;
}

.score-separator {
  text-align: center;
  justify-self: center;
  color: #ddd6fe;
  font-weight: 900;
}

.fixture-lock {
  text-align: right;
}

.fixture-lock.remaining {
  color: #86efac;
  text-shadow: 0 0 8px rgba(34, 197, 94, 0.36);
}

.fixture-lock.locked {
  color: #fecaca;
  text-shadow: none;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

button {
  min-height: 38px;
  border: 0;
  border-radius: 8px;
  padding: 9px 14px;
  background: linear-gradient(135deg, #8b5cf6, #c4b5fd);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.prediction-summary-list {
  display: grid;
  gap: 5px;
}

.summary-row {
  display: grid;
  grid-template-columns: minmax(110px, 1fr) 64px minmax(110px, 1fr) 30px;
  align-items: center;
  min-height: 34px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
}

.summary-score {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.summary-status {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 24px;
}

.summary-row span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 800;
}

.summary-row span:first-child {
  text-align: right;
}

.summary-row strong {
  text-align: center;
  font-size: 17px;
}

.summary-row small {
  grid-column: 1 / -1;
  color: #bbf7d0;
  text-align: center;
  font-weight: 900;
}

.summary-row small.summary-cursed-label {
  grid-column: 2;
  color: #ff1f1f;
  text-align: center;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 10px rgba(255, 31, 31, 0.9),
    0 0 18px rgba(249, 115, 22, 0.58);
}

.curse-modal {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  padding: 18px;
  background: rgba(8, 3, 20, 0.54);
  backdrop-filter: blur(7px);
  z-index: 1000;
}

.curse-modal.show {
  display: grid;
}

.curse-panel {
  width: min(720px, 100%);
  display: grid;
  gap: 16px;
  justify-items: center;
  border-radius: 16px;
  padding: 18px 14px 24px;
  background: transparent;
  border: 0;
  box-shadow: none;
  text-align: center;
}

.curse-panel h2 {
  margin: 0;
  color: #fff;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 16px rgba(248, 113, 113, 0.82);
}

.curse-card-list {
  display: flex;
  gap: 16px;
  justify-content: center;
  align-items: stretch;
  flex-wrap: wrap;
  width: 100%;
}

.curse-card-wrap {
  display: grid;
  gap: 9px;
  justify-items: center;
}

.curse-card-played-by {
  color: #fff;
  font-weight: 950;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 12px rgba(251, 113, 133, 0.7);
}

.curse-detail-card {
  width: min(330px, calc(100vw - 40px));
  height: min(430px, calc(100vh - 170px));
  min-height: 330px;
  display: flex;
  flex-direction: column;
  gap: 0;
  border-radius: 18px;
  padding: 24px 20px;
  text-align: center;
  color: #fff;
  position: relative;
  overflow: hidden;
  border: 3px solid #fb7185;
  background: linear-gradient(135deg, #4c0519 0%, #991b1b 24%, #ef4444 50%, #be123c 72%, #fecaca 100%);
  box-shadow: 0 0 30px rgba(251, 113, 133, 0.68), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 22px rgba(255,255,255,0.16);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 2px 5px rgba(0,0,0,0.78);
}

.curse-detail-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 28%),
    linear-gradient(42deg, rgba(255,255,255,0.12) 0 12%, transparent 12% 27%, rgba(255,255,255,0.09) 27% 38%, transparent 38% 100%);
  pointer-events: none;
}

.curse-detail-card strong,
.curse-detail-card p {
  position: relative;
  z-index: 1;
}

.curse-detail-card strong {
  min-height: 0;
  flex: 0 0 22%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  padding: 0 2px 8px;
  color: #fff;
  font-size: clamp(1.18rem, 2.6vw, 1.46rem);
  line-height: 1.18;
  font-weight: 950;
}

.curse-detail-card p {
  flex: 1 1 78%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  padding: 0 2px;
  color: #fff;
  font-size: clamp(0.78rem, 1.45vw, 0.95rem);
  font-weight: 850;
  line-height: 1.35;
  overflow-y: auto;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

.curse-close {
  justify-self: center;
  min-width: 120px;
  min-height: 42px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #2e1065, #4c1d95);
  color: #fff;
  border: 1px solid rgba(216, 180, 254, 0.26);
  border-radius: 8px;
  font-size: 15px;
  font-weight: 850;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(17, 7, 38, 0.42);
  transition: all 0.3s ease;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92);
}

.curse-close:hover {
  background: linear-gradient(135deg, #4c1d95, #6d28d9);
  transform: translateY(-2px);
}

footer {
  text-align: center;
  padding: 12px;
  color: #4c1d95;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
  font-size: 12px;
}

@media (max-width: 720px) {
  header {
    padding: 12px 10px;
  }

  main {
    padding: 8px 8px 14px;
  }

  .toolbar {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    justify-content: center;
    gap: 6px;
    width: min(100%, 460px);
    margin: 0 auto 8px;
  }

  .toolbar a {
    min-height: 30px;
    padding: 6px 5px;
    font-size: 12px;
    line-height: 1.05;
  }

  .page-head {
    display: block;
    text-align: center;
  }

  .page-head h2 {
    margin-bottom: 4px;
  }

  .fixture-row {
    grid-template-columns: 34px minmax(0, 1fr) 56px;
    min-height: 34px;
    padding: 4px 5px;
    gap: 4px;
  }

  .fixture-main {
    grid-template-columns: minmax(56px, 1fr) 36px 12px 36px minmax(56px, 1fr);
    gap: 4px;
  }

  .fixture-row::before {
    display: none;
    content: none;
  }

  .hedge-controls {
    grid-template-columns: 1fr 36px 10px 36px;
  }

  .scoreline-controls {
    grid-template-columns: 1fr 36px 10px 36px;
  }

  .hedge-controls button {
    grid-column: 1 / -1;
  }

  .scoreline-label {
    grid-column: 1 / -1;
  }

  .fixture-lock-wrap {
    justify-content: center;
    min-height: 18px;
    gap: 0;
  }

  .fixture-lock-wrap .curse-marker {
    position: absolute;
    right: -7px;
    top: -10px;
    transform: none;
  }

  .fixture-lock {
    display: block;
    text-align: center;
    font-size: 11px;
    min-width: 0;
    width: 56px;
    max-width: 56px;
    overflow: visible;
  }

  .fixture-gameweek {
    font-size: 11px;
    padding: 3px 4px;
  }

  .restriction-panel {
    gap: 9px;
    padding: 9px;
  }

  .prediction-restriction-cards {
    gap: 9px;
  }

  .prediction-restriction-card {
    width: 104px;
    min-height: 134px;
    padding: 12px 8px;
    border-radius: 12px;
  }

  .prediction-restriction-card-icon {
    width: 32px;
    height: 32px;
    font-size: 19px;
  }

  .prediction-restriction-card-name {
    font-size: 12px;
  }

  .prediction-restriction-played-by {
