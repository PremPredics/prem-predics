<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Predictions</title>
<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #4c1d95, #7c3aed, #1e0f3d);
  color: #f3f4f6;
  overflow-x: hidden;
}

header {
  padding: 16px 14px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  box-shadow: 0 8px 20px rgba(0,0,0,0.42);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.3px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85);
  margin: 0;
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

main {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 12px 12px 20px;
}

.toolbar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}

.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 800;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 8px 11px;
}

.panel {
  max-width: 980px;
  margin: 0 auto;
  background: rgba(46, 16, 102, 0.66);
  border: 2px solid rgba(196, 132, 252, 0.32);
  border-radius: 10px;
  padding: 12px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.26);
}

.page-head {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
  text-align: center;
}

.page-head h2 {
  margin: 0;
  font-size: clamp(1.2rem, 3vw, 1.8rem);
  text-align: center;
}

.state-text,
.message {
  color: #ddd6fe;
  line-height: 1.35;
  margin: 0;
  text-align: center;
}

.message {
  min-height: 22px;
  margin-top: 8px;
}

.message[data-type="success"] {
  color: #bbf7d0;
}

.message[data-type="error"] {
  color: #fecaca;
}

.fixtures {
  display: grid;
  gap: 5px;
}

.hedge-panel {
  display: grid;
  gap: 9px;
  margin-bottom: 10px;
  padding: 10px;
  border-radius: 9px;
  background: rgba(21, 128, 61, 0.22);
  border: 1px solid rgba(134, 239, 172, 0.36);
  text-align: center;
}

.hedge-panel h3 {
  margin: 0;
  color: #bbf7d0;
}

.god-panel {
  background: rgba(250, 204, 21, 0.18);
  border-color: rgba(253, 224, 71, 0.42);
}

.god-panel h3,
.super-score-panel h3 {
  color: #fde68a;
}

.super-score-panel {
  background: rgba(14, 165, 233, 0.18);
  border-color: rgba(125, 211, 252, 0.4);
}

.restriction-panel {
  background: rgba(220, 38, 38, 0.18);
  border-color: rgba(252, 165, 165, 0.42);
}

.restriction-panel h3 {
  color: #fecaca;
}

.hedge-controls {
  display: grid;
  grid-template-columns: minmax(180px, 1fr) 46px 14px 46px 112px;
  gap: 8px;
  align-items: center;
}

.scoreline-controls {
  grid-template-columns: minmax(120px, 1fr) 46px 14px 46px 112px;
}

.scoreline-label {
  font-weight: 900;
  color: #e0f2fe;
}

.hedge-controls select {
  min-height: 34px;
  width: 100%;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 7px;
  padding: 6px 8px;
  background: rgba(17, 7, 38, 0.76);
  color: #fff;
  font: 800 13px 'Segoe UI', Arial, sans-serif;
}

.fixture-row {
  display: grid;
  grid-template-columns: 72px minmax(110px, 1fr) 46px 14px 46px minmax(110px, 1fr) 112px;
  gap: 6px;
  align-items: center;
  min-height: 38px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
}

.fixture-flags {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
}

.fixture-gameweek {
  justify-self: center;
  border-radius: 999px;
  padding: 4px 7px;
  background: rgba(17, 7, 38, 0.72);
  border: 1px solid rgba(216, 180, 254, 0.24);
  color: #fde68a;
  font-size: 12px;
  font-weight: 900;
}

.curse-marker {
  width: 25px;
  height: 25px;
  min-height: 25px;
  display: inline-grid;
  place-items: center;
  border: 1px solid rgba(254, 202, 202, 0.82);
  border-radius: 999px;
  padding: 0;
  background:
    radial-gradient(circle at 42% 25%, rgba(254, 226, 226, 0.72), transparent 24%),
    linear-gradient(135deg, #7f1d1d, #dc2626 54%, #fb7185);
  color: #fff;
  cursor: pointer;
  font-size: 15px;
  line-height: 1;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95);
  box-shadow: 0 0 14px rgba(239, 68, 68, 0.66), 0 0 26px rgba(249, 115, 22, 0.28);
}

.curse-marker:hover {
  transform: translateY(-1px) scale(1.06);
}

.fixture-lock {
  color: #ddd6fe;
  font-size: 12px;
  font-weight: 800;
}

.fixture-team {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 900;
  font-size: 14px;
}

.fixture-team.home {
  text-align: right;
}

.score-input {
  width: 46px;
  height: 30px;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 7px;
  background: rgba(17, 7, 38, 0.76);
  color: #fff;
  text-align: center;
  font: 900 15px 'Segoe UI', Arial, sans-serif;
}

.score-input:disabled {
  opacity: 0.58;
}

.score-separator {
  text-align: center;
  color: #ddd6fe;
  font-weight: 900;
}

.fixture-lock {
  text-align: right;
}

.fixture-lock.remaining {
  color: #86efac;
  text-shadow: 0 0 8px rgba(34, 197, 94, 0.36);
}

.fixture-lock.locked {
  color: #fecaca;
  text-shadow: none;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 10px;
}

button {
  min-height: 38px;
  border: 0;
  border-radius: 8px;
  padding: 9px 14px;
  background: linear-gradient(135deg, #8b5cf6, #c4b5fd);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
}

button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.prediction-summary-list {
  display: grid;
  gap: 5px;
}

.summary-row {
  display: grid;
  grid-template-columns: minmax(110px, 1fr) 64px minmax(110px, 1fr);
  align-items: center;
  min-height: 34px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
}

.summary-score {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.summary-row span {
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 800;
}

.summary-row span:first-child {
  text-align: right;
}

.summary-row strong {
  text-align: center;
  font-size: 17px;
}

.summary-row small {
  grid-column: 1 / -1;
  color: #bbf7d0;
  text-align: center;
  font-weight: 900;
}

.curse-modal {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  padding: 18px;
  background: rgba(8, 3, 20, 0.54);
  backdrop-filter: blur(7px);
  z-index: 1000;
}

.curse-modal.show {
  display: grid;
}

.curse-panel {
  width: min(560px, 100%);
  display: grid;
  gap: 12px;
  border-radius: 12px;
  padding: 20px;
  background: linear-gradient(135deg, rgba(76, 5, 25, 0.98), rgba(17, 7, 38, 0.98));
  border: 2px solid rgba(251, 113, 133, 0.54);
  box-shadow: 0 20px 52px rgba(0,0,0,0.5), 0 0 30px rgba(239, 68, 68, 0.22);
  text-align: center;
}

.curse-panel h2 {
  margin: 0;
  color: #fff;
}

.curse-detail {
  display: grid;
  gap: 6px;
  padding: 12px;
  border-radius: 9px;
  background: rgba(17, 7, 38, 0.46);
  border: 1px solid rgba(254, 202, 202, 0.24);
}

.curse-detail strong {
  color: #fecaca;
}

.curse-detail span {
  color: #fff;
  font-weight: 900;
}

.curse-detail p {
  margin: 0;
  color: #f5f3ff;
  line-height: 1.45;
}

.curse-close {
  justify-self: center;
  min-width: 120px;
  background: linear-gradient(135deg, #7f1d1d, #ef4444);
}

footer {
  text-align: center;
  padding: 12px;
  color: #d8b4fe;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
  font-size: 12px;
}

@media (max-width: 720px) {
  header {
    padding: 12px 10px;
  }

  main {
    padding: 8px 8px 14px;
  }

  .toolbar {
    justify-content: center;
  }

  .page-head {
    display: block;
    text-align: center;
  }

  .page-head h2 {
    margin-bottom: 4px;
  }

  .fixture-row {
    grid-template-columns: 62px minmax(72px, 1fr) 36px 10px 36px minmax(72px, 1fr);
    min-height: 34px;
    padding: 4px 5px;
    gap: 4px;
  }

  .hedge-controls {
    grid-template-columns: 1fr 36px 10px 36px;
  }

  .scoreline-controls {
    grid-template-columns: 1fr 36px 10px 36px;
  }

  .hedge-controls button {
    grid-column: 1 / -1;
  }

  .scoreline-label {
    grid-column: 1 / -1;
  }

  .fixture-lock {
    display: block;
    grid-column: 1 / -1;
    text-align: center;
    font-size: 11px;
  }

  .fixture-gameweek {
    font-size: 11px;
    padding: 4px 6px;
  }

  .fixture-team {
    font-size: 12px;
    overflow: visible;
    text-overflow: clip;
    white-space: normal;
    line-height: 1.05;
  }

  .score-input {
    width: 36px;
    height: 27px;
    font-size: 14px;
  }

  .actions {
    justify-content: stretch;
  }

  button {
    width: 100%;
  }

  .curse-marker {
    width: 23px;
    min-width: 23px;
    height: 23px;
    min-height: 23px;
  }

  .summary-row {
    grid-template-columns: minmax(82px, 1fr) 50px minmax(82px, 1fr);
    min-height: 31px;
    font-size: 12px;
  }
}
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - Predictions</h1>
</header>

<main>
  <div class="toolbar">
    <a data-league-back href="leagues.html">Back To League Hub</a>
  </div>

  <section class="panel">
    <div class="page-head">
      <div>
        <h2 data-league-title>Loading predictions...</h2>
        <p class="state-text" data-gameweek-summary>Checking fixtures and deadlines.</p>
      </div>
    </div>

    <div class="fixtures" data-fixtures>
      <p class="state-text">Loading fixtures...</p>
    </div>

    <div class="actions">
      <button type="button" data-save-all disabled>Save All Predictions</button>
      <button type="button" data-edit-predictions hidden>Edit Predictions</button>
    </div>
    <p class="message" data-prediction-message></p>
  </section>
</main>

<div class="curse-modal" data-curse-modal aria-hidden="true">
  <div class="curse-panel" role="dialog" aria-modal="true" aria-label="Active prediction curse">
    <h2>Active Curse</h2>
    <div data-curse-modal-body></div>
    <button class="curse-close" type="button" data-close-curse>Close</button>
  </div>
</div>

<footer>&copy; 2026 Prem Predics | Predictions</footer>

<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/predictions.js"></script>
</body>
</html>
