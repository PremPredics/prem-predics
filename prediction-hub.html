<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Predictions</title>
<style>
* { box-sizing: border-box; }
body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
}
header {
  padding: 24px 16px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.45);
}
header h1 {
  margin: 0;
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85);
  font-size: clamp(2rem, 5vw, 3.2rem);
  line-height: 1.05;
}
main {
  width: min(1020px, 100%);
  margin: 0 auto;
  padding: 30px 14px 48px;
}
.toolbar {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
}
.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 900;
  background:
    radial-gradient(circle at 20% 10%, rgba(255,255,255,0.18), transparent 28%),
    linear-gradient(135deg, rgba(46, 16, 101, 0.96), rgba(30, 10, 72, 0.96));
  border: 1px solid rgba(216, 180, 254, 0.38);
  border-radius: 11px;
  padding: 12px 18px;
  box-shadow: 0 12px 24px rgba(46, 16, 101, 0.28), inset 0 1px 0 rgba(255,255,255,0.12);
}
.panel {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  display: grid;
  gap: 18px;
  padding: 28px clamp(20px, 4vw, 34px) 30px;
  background:
    radial-gradient(circle at 18% 0%, rgba(34, 211, 238, 0.18), transparent 30%),
    radial-gradient(circle at 86% 10%, rgba(250, 204, 21, 0.18), transparent 28%),
    linear-gradient(145deg, rgba(76, 29, 149, 0.92), rgba(46, 16, 101, 0.96));
  border: 3px solid rgba(245, 215, 110, 0.76);
  border-radius: 20px;
  box-shadow:
    0 0 22px rgba(245, 215, 110, 0.48),
    0 0 50px rgba(250, 204, 21, 0.18),
    0 18px 38px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.12);
  text-align: center;
}
.panel::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background:
    linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.08) 38%, transparent 64%),
    radial-gradient(circle at 50% 118%, rgba(34, 211, 238, 0.18), transparent 42%);
  pointer-events: none;
}
.panel h2 {
  margin: 0;
  color: #fff;
  font-size: clamp(1.85rem, 4.2vw, 2.7rem);
  line-height: 1.05;
  font-weight: 950;
  text-shadow: 0 0 18px rgba(216, 180, 254, 0.38);
}
.panel p {
  display: none;
  margin: 0;
  color: #ddd6fe;
  line-height: 1.45;
}
.choice-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(220px, 1fr));
  gap: 18px;
}
.choice-card {
  position: relative;
  isolation: isolate;
  overflow: hidden;
  display: grid;
  gap: 12px;
  min-height: 178px;
  align-content: center;
  padding: 26px 22px 24px 28px;
  border-radius: 18px;
  color: #fff;
  text-decoration: none;
  background:
    radial-gradient(circle at 20% 8%, rgba(255,255,255,0.14), transparent 24%),
    linear-gradient(145deg, rgba(17, 7, 38, 0.98), rgba(49, 18, 91, 0.94));
  border: 1px solid rgba(216, 180, 254, 0.38);
  box-shadow:
    0 16px 30px rgba(0,0,0,0.3),
    inset 0 1px 0 rgba(255,255,255,0.1);
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
.choice-card::before {
  content: "";
  position: absolute;
  inset: 0 auto 0 0;
  width: 9px;
  background: var(--choice-accent, #22d3ee);
  box-shadow: 0 0 24px var(--choice-glow, rgba(34, 211, 238, 0.7));
}
.choice-card::after {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: linear-gradient(115deg, transparent, rgba(255,255,255,0.08), transparent);
  transform: translateX(-48%);
  pointer-events: none;
}
.choice-card:first-child {
  --choice-accent: #22d3ee;
  --choice-glow: rgba(34, 211, 238, 0.78);
}
.choice-card:last-child {
  --choice-accent: #facc15;
  --choice-glow: rgba(250, 204, 21, 0.72);
}
.choice-card strong {
  font-size: clamp(1.45rem, 2.5vw, 2rem);
  line-height: 1.05;
  font-weight: 950;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.88),
    1px -1px 0 rgba(0,0,0,0.88),
    -1px 1px 0 rgba(0,0,0,0.88),
    1px 1px 0 rgba(0,0,0,0.88),
    0 0 16px var(--choice-glow, rgba(216, 180, 254, 0.4));
}
.choice-card span {
  color: #f5f3ff;
  font-size: clamp(1rem, 1.45vw, 1.15rem);
  line-height: 1.4;
}
.choice-card:hover {
  transform: translateY(-3px);
  border-color: rgba(255,255,255,0.62);
  box-shadow:
    0 0 24px var(--choice-glow, rgba(216, 180, 254, 0.35)),
    0 18px 34px rgba(0,0,0,0.32),
    inset 0 1px 0 rgba(255,255,255,0.14);
}
.toolbar a[aria-disabled="true"],
.choice-card[aria-disabled="true"] {
  pointer-events: none;
  opacity: 0.62;
}
footer {
  text-align: center;
  padding: 20px;
  color: #4c1d95;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
}
@media (max-width: 650px) {
  header h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    white-space: nowrap !important;
  }
  main { padding: 16px 10px 34px; }
  .toolbar { margin-bottom: 12px; }
  .panel {
    gap: 14px;
    padding: 18px 14px 17px;
    border-radius: 18px;
  }
  .panel h2 {
    font-size: clamp(1.55rem, 8vw, 2.2rem);
  }
  .choice-grid { grid-template-columns: 1fr; }
  .choice-card {
    min-height: 138px;
    padding: 22px 18px 20px 25px;
  }
}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7b61d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Prem Predics">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="assets/pwa/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/pwa/favicon-32.png">
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - Predictions</h1>
</header>

<main>
  <div class="toolbar">
    <a data-league-back href="#" aria-disabled="true">Back To League Hub</a>
  </div>
  <section class="panel">
    <h2 data-prediction-hub-title>Predictions</h2>
    <p data-prediction-hub-copy></p>
    <div class="choice-grid">
      <a class="choice-card" data-make-predictions href="#" aria-disabled="true">
        <strong>Make Predictions</strong>
        <span>Submit or edit your current gameweek score predictions.</span>
      </a>
      <a class="choice-card" data-view-predictions href="#" aria-disabled="true">
        <strong>View All Player Predictions</strong>
        <span>Compare locked predictions across your private league.</span>
      </a>
    </div>
  </section>
</main>

<footer>2026 Prem Predics | Predictions</footer>
<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/prediction-hub.js"></script>
<script src="assets/js/pwa.js" defer></script>
<script src="assets/js/wider-polish.js" defer></script>
<script src="assets/js/legal-footer.js" defer></script>
</body>
</html>
