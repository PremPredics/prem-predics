<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Predictions</title>
<style>
* { box-sizing: border-box; }
body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #4c1d95, #7c3aed, #1e0f3d);
  color: #f3f4f6;
}
header {
  padding: 24px 16px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  box-shadow: 0 8px 20px rgba(0,0,0,0.45);
}
header h1 {
  margin: 0;
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85);
  font-size: clamp(2rem, 5vw, 3.2rem);
  line-height: 1.05;
}
main {
  width: min(920px, 100%);
  margin: 0 auto;
  padding: 28px 14px 42px;
}
.toolbar {
  display: flex;
  justify-content: center;
  margin-bottom: 18px;
}
.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 900;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 10px 13px;
}
.panel {
  display: grid;
  gap: 18px;
  padding: 22px;
  background: rgba(46, 16, 102, 0.68);
  border: 2px solid rgba(196, 132, 252, 0.32);
  border-radius: 12px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.28);
  text-align: center;
}
.panel h2 {
  margin: 0;
  font-size: clamp(1.5rem, 4vw, 2.15rem);
}
.panel p {
  margin: 0;
  color: #ddd6fe;
  line-height: 1.45;
}
.choice-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(220px, 1fr));
  gap: 14px;
}
.choice-card {
  display: grid;
  gap: 8px;
  min-height: 150px;
  align-content: center;
  padding: 22px 18px;
  border-radius: 10px;
  color: #fff;
  text-decoration: none;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.1), transparent 35%),
    linear-gradient(135deg, rgba(17, 7, 38, 0.94), rgba(49, 18, 91, 0.9));
  border: 1px solid rgba(216, 180, 254, 0.3);
  box-shadow: 0 14px 28px rgba(0,0,0,0.28);
}
.choice-card:first-child { border-left: 7px solid #00e5ff; }
.choice-card:last-child { border-left: 7px solid #facc15; }
.choice-card strong {
  font-size: 24px;
  font-weight: 950;
}
.choice-card span {
  color: #f5f3ff;
  line-height: 1.35;
}
.choice-card:hover {
  transform: translateY(-2px);
  border-color: rgba(255,255,255,0.5);
}
footer {
  text-align: center;
  padding: 20px;
  color: #d8b4fe;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
}
@media (max-width: 650px) {
  header h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    white-space: nowrap !important;
  }
  main { padding: 20px 10px 34px; }
  .choice-grid { grid-template-columns: 1fr; }
  .choice-card { min-height: 118px; }
}
</style>
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - Predictions</h1>
</header>

<main>
  <div class="toolbar">
    <a data-league-back href="league.html">Back To League Hub</a>
  </div>
  <section class="panel">
    <h2 data-prediction-hub-title>Predictions</h2>
    <p data-prediction-hub-copy>Choose what you want to do.</p>
    <div class="choice-grid">
      <a class="choice-card" data-make-predictions href="predictions.html">
        <strong>Make Predictions</strong>
        <span>Submit or edit your current gameweek score predictions.</span>
      </a>
      <a class="choice-card" data-view-predictions href="all-predictions.html">
        <strong>View All Player Predictions</strong>
        <span>Compare locked predictions across your private league.</span>
      </a>
    </div>
  </section>
</main>

<footer>&copy; 2026 Prem Predics | Predictions</footer>
<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/prediction-hub.js"></script>
</body>
</html>
