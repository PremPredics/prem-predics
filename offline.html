<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Prem Predics - Offline</title>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7b61d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Prem Predics">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="assets/pwa/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/pwa/favicon-32.png">
<style>
* {
  box-sizing: border-box;
}

html,
body {
  min-height: 100%;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  padding: max(22px, env(safe-area-inset-top)) 18px max(22px, env(safe-area-inset-bottom));
  font-family: "Segoe UI", Arial, sans-serif;
  color: #fff;
  background:
    radial-gradient(circle at 50% 12%, rgba(255, 255, 255, 0.24), transparent 24%),
    radial-gradient(circle at 20% 82%, rgba(34, 211, 238, 0.24), transparent 30%),
    linear-gradient(135deg, #6d4bd0 0%, #9d7cec 52%, #d5c8ff 100%);
  overflow-x: hidden;
}

.offline-card {
  width: min(520px, 100%);
  display: grid;
  gap: 18px;
  justify-items: center;
  text-align: center;
  padding: clamp(24px, 7vw, 38px);
  border-radius: 22px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255, 255, 255, 0.18), transparent 34%),
    linear-gradient(145deg, rgba(46, 16, 102, 0.96), rgba(20, 7, 48, 0.98));
  border: 3px solid rgba(216, 180, 254, 0.54);
  box-shadow:
    0 26px 78px rgba(21, 8, 50, 0.58),
    0 0 34px rgba(139, 92, 246, 0.32),
    inset 0 1px 0 rgba(255, 255, 255, 0.18);
}

.offline-card img {
  width: clamp(108px, 28vw, 150px);
  height: auto;
  filter:
    drop-shadow(0 14px 28px rgba(0, 0, 0, 0.36))
    drop-shadow(0 0 26px rgba(216, 180, 254, 0.55));
}

h1 {
  margin: 0;
  font-size: clamp(2.3rem, 10vw, 4rem);
  line-height: 0.98;
  font-weight: 950;
  letter-spacing: 0;
  -webkit-text-stroke: 1.8px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 20px rgba(216, 180, 254, 0.8);
}

p {
  max-width: 390px;
  margin: 0;
  color: #ede9fe;
  font-size: clamp(1rem, 4.4vw, 1.18rem);
  line-height: 1.55;
}

.offline-actions {
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-top: 4px;
}

.offline-actions a,
.offline-actions button {
  min-height: 50px;
  display: grid;
  place-items: center;
  border: 0;
  border-radius: 12px;
  color: #fff;
  font: inherit;
  font-weight: 950;
  text-decoration: none;
  cursor: pointer;
  text-shadow:
    -1px -1px 0 rgba(0, 0, 0, 0.82),
    1px -1px 0 rgba(0, 0, 0, 0.82),
    -1px 1px 0 rgba(0, 0, 0, 0.82),
    1px 1px 0 rgba(0, 0, 0, 0.82);
}

.retry {
  background:
    radial-gradient(circle at 26% 16%, rgba(255, 255, 255, 0.7), transparent 20%),
    linear-gradient(135deg, #06b6d4, #2563eb);
  border: 2px solid rgba(165, 243, 252, 0.78) !important;
  box-shadow: 0 0 24px rgba(34, 211, 238, 0.42);
}

.leagues {
  background: linear-gradient(135deg, #5b21b6, #8b5cf6);
  border: 2px solid rgba(216, 180, 254, 0.7) !important;
  box-shadow: 0 0 22px rgba(139, 92, 246, 0.42);
}

@media (max-width: 430px) {
  .offline-actions {
    grid-template-columns: 1fr;
  }
}
</style>
</head>
<body>
  <main class="offline-card" aria-labelledby="offlineTitle">
    <img src="logo-left.png" alt="Prem Predics logo">
    <h1 id="offlineTitle">You are offline</h1>
    <p>Prem Predics is ready to come back as soon as your connection returns. Your saved login should still be waiting when you reconnect.</p>
    <div class="offline-actions">
      <button class="retry" type="button" onclick="window.location.reload()">Try Again</button>
      <a class="leagues" href="leagues.html">My Leagues</a>
    </div>
  </main>
  <script src="assets/js/pwa.js" defer></script>
</body>
</html>
