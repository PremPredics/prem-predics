<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - 2026/27</title>
<style>
/* ===== BODY & BACKGROUND ===== */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #4c1d95, #7c3aed, #1e0f3d);
  color: #f3f4f6;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 25px 20px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  flex-wrap: wrap;
  position: relative;
}

header img {
  height: 60px;
  width: auto;
  transition: transform 0.3s ease;
}

header img:hover {
  transform: scale(1.1);
}

header h1 {
  font-size: 28px;
  margin: 0;
  color: #f3e8ff;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  text-align: center;
  letter-spacing: 0.5px;
}

/* ===== CONTAINER ===== */
.container {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
}

/* ===== MENU BUTTONS ===== */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 25px;
  max-width: 1200px;
  width: 100%;
}

.menu button {
  padding: 30px 25px;
  font-size: 18px;
  font-weight: 600;
  border: none;
  border-radius: 16px;
  cursor: pointer;
  background: linear-gradient(135deg, #8b5cf6, #a78bfa);
  color: #fff;
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 15px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 2px solid rgba(255,255,255,0.1);
}

.menu button::before {
  content: '';
  position: absolute;
  top: 0;
  left: -100%;
  width: 100%;
  height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
  transition: left 0.5s ease;
}

.menu button:hover::before {
  left: 100%;
}

.menu button:hover {
  background: linear-gradient(135deg, #a78bfa, #c4b5fd);
  transform: translateY(-8px) scale(1.05);
  box-shadow: 0 15px 40px rgba(139, 92, 246, 0.5);
}

.menu button:active {
  transform: translateY(-2px) scale(0.98);
  box-shadow: 0 8px 15px rgba(0,0,0,0.3);
}

/* ===== ICON STYLING ===== */
.menu svg {
  width: 40px;
  height: 40px;
  fill: #fff;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  transition: transform 0.3s ease;
}

.menu button:hover svg {
  transform: scale(1.15) rotate(5deg);
}

/* ===== ICON CONTAINER ===== */
.icon-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 25px 20px;
  color: #d8b4fe;
  font-size: 14px;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
  background: rgba(0,0,0,0.1);
}

/* ===== RESPONSIVE - TABLET ===== */
@media (max-width: 1024px) {
  .menu {
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 0 10px;
  }

  header h1 {
    font-size: 24px;
  }

  .menu button {
    padding: 25px 20px;
    font-size: 16px;
  }

  .menu svg {
    width: 35px;
    height: 35px;
  }
}

/* ===== RESPONSIVE - MOBILE ===== */
@media (max-width: 768px) {
  header {
    flex-direction: column;
    gap: 15px;
    padding: 20px 15px;
  }

  header img {
    height: 50px;
  }

  header h1 {
    font-size: 22px;
    margin: 0;
  }

  .container {
    padding: 30px 15px;
  }

  .menu {
    grid-template-columns: 1fr;
    gap: 18px;
  }

  .menu button {
    padding: 25px 20px;
    font-size: 16px;
    gap: 12px;
  }

  .menu svg {
    width: 32px;
    height: 32px;
  }

  footer {
    font-size: 12px;
    padding: 20px 15px;
  }
}

/* ===== RESPONSIVE - SMALL MOBILE ===== */
@media (max-width: 480px) {
  header h1 {
    font-size: 18px;
  }

  header img {
    height: 45px;
  }

  .container {
    padding: 20px 10px;
  }

  .menu {
    gap: 15px;
  }

  .menu button {
    padding: 20px 15px;
    font-size: 15px;
    gap: 10px;
    border-radius: 12px;
  }

  .menu svg {
    width: 28px;
    height: 28px;
  }

  footer {
    font-size: 11px;
    padding: 15px 10px;
  }
}

/* ===== LANDSCAPE MODE ===== */
@media (max-height: 500px) and (orientation: landscape) {
  header {
    padding: 12px 20px;
  }

  header h1 {
    font-size: 20px;
  }

  .container {
    padding: 15px 20px;
  }

  .menu button {
    padding: 15px 20px;
    font-size: 14px;
  }

  .menu svg {
    width: 28px;
    height: 28px;
  }

  footer {
    padding: 10px 20px;
    font-size: 11px;
  }
}
</style>
</head>
