<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics</title>
<style>
/* ===== BODY & BACKGROUND ===== */
html {
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  overscroll-behavior-x: none;
  touch-action: pan-y;
}

body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  width: 100%;
  max-width: 100%;
  overflow-x: hidden;
  overscroll-behavior-x: none;
  touch-action: pan-y;
}

/* ===== HEADER ===== */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 18px 20px 4px;
  background:
    radial-gradient(circle at 50% 10%, rgba(255,255,255,0.16), transparent 34%),
    linear-gradient(180deg, rgba(123, 97, 216, 0.28), rgba(123, 97, 216, 0));
  box-shadow: none;
  position: relative;
}

.home-logo-aura {
  position: relative;
  display: grid;
  place-items: center;
  padding: 12px 18px;
  isolation: isolate;
}

.home-logo-aura::before {
  content: '';
  position: absolute;
  inset: -22px -34px;
  z-index: -1;
  border-radius: 50%;
  background:
    radial-gradient(ellipse at center, rgba(255,255,255,0.3) 0%, rgba(216,180,254,0.3) 34%, rgba(167,139,250,0.16) 58%, transparent 78%),
    radial-gradient(ellipse at center, rgba(76,29,149,0.22) 0%, transparent 72%);
  filter: blur(12px);
  opacity: 0.95;
}

header img {
  width: clamp(150px, 19vw, 260px);
  height: auto;
  max-width: min(78vw, 260px);
  display: block;
  border-radius: 22px;
  -webkit-mask-image: radial-gradient(ellipse at center, #000 58%, rgba(0,0,0,0.86) 72%, transparent 100%);
  mask-image: radial-gradient(ellipse at center, #000 58%, rgba(0,0,0,0.86) 72%, transparent 100%);
  filter:
    drop-shadow(0 14px 24px rgba(46, 16, 102, 0.24))
    drop-shadow(0 0 22px rgba(255,255,255,0.2));
  transition: transform 0.3s ease, filter 0.3s ease;
}

header img:hover {
  transform: scale(1.025);
  filter:
    drop-shadow(0 16px 28px rgba(46, 16, 102, 0.3))
    drop-shadow(0 0 28px rgba(255,255,255,0.26));
}

/* ===== CONTAINER ===== */
.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  gap: 18px;
  padding: 24px 20px 36px;
}

.account-panel {
  width: min(100%, 900px);
  min-height: 64px;
}

.account-panel-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 16px 18px;
  background: rgba(46, 16, 102, 0.62);
  border: 2px solid rgba(196, 132, 252, 0.28);
  border-radius: 12px;
  box-shadow: 0 10px 26px rgba(0,0,0,0.26);
  flex-wrap: wrap;
}

.account-identity {
  min-width: 180px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.account-avatar {
  width: 48px;
  height: 48px;
  flex: 0 0 auto;
  border-radius: 50%;
  display: grid;
  place-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #f3e8ff, #a78bfa);
  border: 2px solid rgba(255,255,255,0.5);
  color: #2e1065;
  font-size: 18px;
  font-weight: 900;
  box-shadow: 0 6px 16px rgba(0,0,0,0.22);
  text-decoration: none;
}

.account-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.account-copy {
  min-width: 0;
}

.account-label,
.account-subtext {
  display: block;
  color: #ddd6fe;
  font-size: 13px;
  line-height: 1.25;
}

.account-name {
  display: block;
  color: #fff;
  font-size: 20px;
  font-weight: 900;
  line-height: 1.15;
}

.account-actions {
  display: flex;
  align-items: stretch;
  justify-content: flex-end;
  gap: 10px;
  flex-wrap: wrap;
}

.account-action {
  min-width: 118px;
  min-height: 48px;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 9px 14px;
  border: 0;
  border-radius: 8px;
  background: #f3e8ff;
  color: #2e1065;
  font-weight: 800;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 5px 14px rgba(0,0,0,0.2);
}

.account-action:hover {
  background: #fff;
  transform: translateY(-1px);
}

.account-action-title {
  display: block;
  font-size: 14px;
  line-height: 1.1;
}

.account-action-detail {
  display: block;
  color: #5b21b6;
  font-size: 12px;
  line-height: 1.1;
}

.account-action.logout {
  background:
    radial-gradient(circle at 24% 16%, rgba(255,255,255,0.78), transparent 20%),
    linear-gradient(135deg, #ef4444, #b91c1c 62%, #7f1d1d);
  border: 2px solid rgba(254, 202, 202, 0.78);
  color: #fff;
  box-shadow:
    0 0 18px rgba(248, 113, 113, 0.52),
    0 6px 16px rgba(127, 29, 29, 0.34);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.78),
    1px -1px 0 rgba(0,0,0,0.78),
    -1px 1px 0 rgba(0,0,0,0.78),
    1px 1px 0 rgba(0,0,0,0.78);
}

.account-action.logout:hover {
  background:
    radial-gradient(circle at 24% 16%, rgba(255,255,255,0.9), transparent 20%),
    linear-gradient(135deg, #ff3b30, #ef4444 58%, #991b1b);
}

.home-action-panel {
  width: min(100%, 900px);
  display: grid;
  gap: 10px;
  padding: 16px;
  border-radius: 12px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.24);
  box-shadow: 0 10px 24px rgba(0,0,0,0.22);
}

.home-action-panel[hidden] {
  display: none;
}

.home-action-title {
  margin: 0;
  text-align: center;
  color: #fff;
  font-size: 22px;
  font-weight: 950;
  letter-spacing: 0;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9),
    0 0 12px rgba(216, 180, 254, 0.6);
}

.home-action-list {
  display: grid;
  gap: 8px;
}

.home-action-row {
  display: grid;
  grid-template-columns: 1fr;
  gap: 10px;
  padding: 10px;
  border-radius: 13px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.06), transparent 34%),
    rgba(46, 16, 102, 0.5);
  border: 3px solid #8a00c4;
  box-shadow:
    0 0 20px rgba(218, 0, 255, 0.82),
    0 0 44px rgba(176, 0, 224, 0.52),
    0 0 72px rgba(233, 107, 255, 0.28),
    inset 0 1px 0 rgba(255,255,255,0.12);
}

.home-action-league-pill {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  align-items: center;
  gap: 10px;
  padding: 9px 9px 9px 16px;
  border-radius: 999px;
  background:
    radial-gradient(circle at 12% 12%, rgba(255,255,255,0.18), transparent 22%),
    linear-gradient(135deg, #9a12d3, #8a00c4 62%, #7600aa);
  border: 1px solid rgba(232, 170, 255, 0.66);
  box-shadow:
    0 0 17px rgba(218, 0, 255, 0.46),
    0 8px 18px rgba(17, 7, 38, 0.22),
    inset 0 1px 0 rgba(255,255,255,0.18);
}

.home-action-league-copy {
  min-width: 0;
  display: flex;
  flex-direction: row;
  align-items: center;
  justify-content: center;
  gap: 8px;
  text-align: center;
  white-space: nowrap;
}

.home-action-league-name {
  max-width: 100%;
  color: #fff;
  font-size: 15px;
  font-weight: 1000;
  line-height: 1.05;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.home-action-gameweek {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 2px 7px;
  border-radius: 999px;
  background: rgba(17, 7, 38, 0.28);
  color: #ede9fe;
  font-size: 11px;
  font-weight: 1000;
  line-height: 1.05;
}

.home-action-open {
  color: #fff;
  font-weight: 950;
  text-decoration: none;
  padding: 9px 15px;
  border-radius: 999px;
  background:
    radial-gradient(circle at 26% 18%, rgba(255,255,255,0.48), transparent 22%),
    linear-gradient(135deg, #34d399, #16a34a 62%, #047857);
  border: 1px solid rgba(187, 247, 208, 0.72);
  text-align: center;
  box-shadow:
    0 0 18px rgba(34, 197, 94, 0.42),
    0 6px 14px rgba(6, 78, 59, 0.28),
    inset 0 1px 0 rgba(255,255,255,0.18);
}

.home-action-status-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 8px;
}

.home-action-status-line {
  min-height: 58px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 4px;
  padding: 8px 6px;
  border-radius: 11px;
  background: #8a00c4;
  border: 1px solid rgba(232, 170, 255, 0.58);
  color: #fff;
  font-weight: 900;
  text-align: center;
  box-shadow:
    0 0 15px rgba(218, 0, 255, 0.46),
    inset 0 1px 0 rgba(255,255,255,0.16);
}

.home-action-status-line strong {
  color: #fff;
  font-size: 12px;
  line-height: 1.05;
}

.home-action-status {
  font-weight: 950;
  text-align: center;
  font-size: 12px;
  line-height: 1.08;
}

.home-action-status.complete {
  color: #19ff7a;
  text-shadow: 0 0 10px rgba(34, 255, 136, 0.42);
}

.home-action-status.required {
  color: #ff3b3b;
  text-shadow: 0 0 10px rgba(255, 59, 59, 0.42);
}

.home-action-status.na {
  color: #d8b4fe;
  text-shadow: 0 0 10px rgba(216, 180, 254, 0.42);
}

/* ===== MENU BUTTONS ===== */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 18px;
  max-width: 720px;
  width: 100%;
}

.menu button {
  min-height: 174px;
  padding: 28px 24px;
  font-size: 20px;
  font-weight: 950;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.13), transparent 34%),
    linear-gradient(145deg, rgba(17, 7, 38, 0.96), rgba(49, 18, 91, 0.92) 58%, rgba(76, 29, 149, 0.86));
  color: #fff;
  box-shadow: 0 16px 36px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.14);
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 13px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(216, 180, 254, 0.32);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 0 16px rgba(255,255,255,0.32);
}

.menu button::before {
  content: '';
  position: absolute;
  inset: -40% auto auto -18%;
  width: 130px;
  height: 220px;
  background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
  transform: rotate(22deg);
  transition: transform 0.28s ease, opacity 0.28s ease;
  opacity: 0.72;
}

.menu button::after {
  content: '';
  position: absolute;
  inset: auto 16px 14px;
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(216, 180, 254, 0.12), #f5d76e, rgba(216, 180, 254, 0.12));
  box-shadow: 0 0 18px rgba(245, 215, 110, 0.34);
}

.menu button:hover::before {
  transform: rotate(22deg) translateX(24px);
  opacity: 0.95;
}

.menu button:hover {
  transform: translateY(-5px);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.16), transparent 34%),
    linear-gradient(145deg, rgba(24, 10, 54, 0.98), rgba(67, 28, 127, 0.94) 58%, rgba(91, 33, 182, 0.9));
  box-shadow: 0 22px 44px rgba(0,0,0,0.48), 0 0 24px rgba(216, 180, 254, 0.26);
}

.menu button:active {
  transform: translateY(-1px);
  box-shadow: 0 8px 15px rgba(0,0,0,0.3);
}

.menu button[hidden] {
  display: none;
}

.menu button.admin-access {
  min-height: 128px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.16), transparent 34%),
    linear-gradient(145deg, rgba(69, 26, 3, 0.98), rgba(146, 64, 14, 0.94) 58%, rgba(250, 204, 21, 0.74));
  border-color: rgba(253, 224, 71, 0.78);
  box-shadow: 0 16px 36px rgba(69, 26, 3, 0.38), 0 0 24px rgba(250, 204, 21, 0.22);
}

.menu button.admin-access:hover {
  background:
    linear-gradient(135deg, rgba(255,255,255,0.2), transparent 34%),
    linear-gradient(145deg, rgba(92, 38, 5, 0.98), rgba(180, 83, 9, 0.96) 58%, rgba(253, 224, 71, 0.82));
}

/* ===== ICON STYLING ===== */
.menu svg {
  width: 40px;
  height: 40px;
  fill: #f5f3ff;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  transition: transform 0.3s ease;
}

.menu button:hover svg {
  transform: scale(1.15) rotate(5deg);
}

/* ===== ICON CONTAINER ===== */
.icon-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 25px 20px;
  color: #3b0764;
  font-size: 14px;
  font-weight: 800;
  border-top: 1px solid rgba(76, 29, 149, 0.18);
  background:
    linear-gradient(180deg, rgba(243, 232, 255, 0.26), rgba(216, 180, 254, 0.34));
}

/* ===== RESPONSIVE - TABLET ===== */
@media (max-width: 1024px) {
  .menu {
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 0 10px;
  }

  .menu button {
    padding: 25px 20px;
    font-size: 16px;
  }

  .menu svg {
    width: 35px;
    height: 35px;
  }
}

/* ===== RESPONSIVE - MOBILE ===== */
@media (max-width: 768px) {
  header {
    padding: 14px 15px 2px;
  }

  header img {
    width: min(60vw, 205px);
    max-width: 205px;
  }

  .container {
    padding: 18px 15px 28px;
    gap: 14px;
  }

  .account-panel-content {
    justify-content: center;
    text-align: center;
  }

  .account-identity {
    justify-content: center;
  }

  .account-actions {
    width: 100%;
    justify-content: center;
  }

  .home-action-row {
    gap: 8px;
    padding: 8px;
    border-radius: 12px;
    text-align: center;
  }

  .home-action-panel {
    width: min(100%, 560px);
    gap: 7px;
    padding: 10px;
    border-radius: 10px;
  }

  .home-action-title {
    font-size: 17px;
  }

  .home-action-list {
    gap: 6px;
  }

  .home-action-league-pill {
    gap: 8px;
    padding: 8px 8px 8px 13px;
  }

  .home-action-league-name {
    font-size: 13.5px;
  }

  .home-action-gameweek {
    font-size: 10.5px;
    padding: 2px 6px;
  }

  .home-action-open {
    min-width: 62px;
    padding: 8px 12px;
    font-size: 12px;
  }

  .home-action-status-grid {
    gap: 5px;
  }

  .home-action-status-line {
    min-height: 54px;
    gap: 3px;
    padding: 7px 3px;
  }

  .home-action-status-line strong {
    font-size: 10.5px;
  }

  .home-action-status {
    font-size: 10.5px;
  }

  .menu {
    grid-template-columns: 1fr;
    gap: 18px;
  }

  .menu button {
    min-height: 142px;
    padding: 24px 20px;
    font-size: 16px;
    gap: 12px;
  }

  .menu svg {
    width: 32px;
    height: 32px;
  }

  footer {
    font-size: 12px;
    padding: 20px 15px;
  }
}

/* ===== RESPONSIVE - SMALL MOBILE ===== */
@media (max-width: 480px) {
  header img {
    width: min(62vw, 185px);
    max-width: 185px;
  }

  .container {
    padding: 16px 10px 24px;
  }

  .account-panel-content {
    padding: 14px;
  }

  .account-action {
    flex: 1 1 100%;
    width: 100%;
  }

  .menu {
    gap: 15px;
  }

  .menu button {
    min-height: 126px;
    padding: 20px 15px;
    font-size: 15px;
    gap: 10px;
    border-radius: 12px;
  }

  .menu svg {
    width: 28px;
    height: 28px;
  }

  footer {
    font-size: 11px;
    padding: 15px 10px;
  }
}

/* ===== LANDSCAPE MODE ===== */
@media (max-height: 500px) and (orientation: landscape) {
  header {
    padding: 10px 20px 0;
  }

  header img {
    width: min(26vw, 190px);
  }

  .container {
    padding: 15px 20px;
  }

  .menu button {
    padding: 15px 20px;
    font-size: 14px;
  }

  .menu svg {
    width: 28px;
    height: 28px;
  }

  footer {
    padding: 10px 20px;
    font-size: 11px;
  }
}
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>

<header>
  <div class="home-logo-aura">
    <img src="logo-left.png" alt="Prem Predics">
  </div>
</header>

<!-- ===== CONTAINER FOR CENTERED CONTENT ===== -->
<div class="container">
  <div class="account-panel" data-auth-panel></div>
  <section class="home-action-panel" data-home-action-panel hidden>
    <h2 class="home-action-title">Quick Access - All Leagues</h2>
    <div class="home-action-list" data-home-action-list></div>
  </section>

  <!-- ===== MENU BUTTONS WITH ICONS ===== -->
  <div class="menu">
    <!-- How to Play -->
    <button onclick="location.href='how-to-play.html'">
      <div class="icon-container">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
          <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 16.25c-.73 0-1.25-.52-1.25-1.2 0-.69.52-1.2 1.25-1.2s1.25.51 1.25 1.2c0 .68-.52 1.2-1.25 1.2zm1.8-6.58c-.43.37-.68.66-.78 1.33h-2.04c.11-1.18.56-1.86 1.32-2.48.72-.59 1.08-.98 1.08-1.61 0-.68-.48-1.13-1.27-1.13-.85 0-1.37.47-1.51 1.35H8.55C8.72 7.2 10.03 6 12.11 6c2.03 0 3.39 1.1 3.39 2.82 0 1.2-.61 1.88-1.7 2.85z"/>
        </svg>
      </div>
      How To Play
