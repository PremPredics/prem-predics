<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics</title>
<style>
/* ===== BODY & BACKGROUND ===== */
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #4c1d95, #7c3aed, #1e0f3d);
  color: #f3f4f6;
  margin: 0;
  padding: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ===== HEADER ===== */
header {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 20px;
  padding: 25px 20px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
  flex-wrap: wrap;
  position: relative;
}

header img {
  height: 60px;
  width: auto;
  transition: transform 0.3s ease;
}

header img:hover {
  transform: scale(1.1);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85),
    0 0 24px rgba(124, 58, 237, 0.55);
  margin: 0;
  font-size: clamp(2rem, 5.5vw, 3.35rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

/* ===== CONTAINER ===== */
.container {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 24px;
  padding: 40px 20px;
}

.account-panel {
  width: min(100%, 900px);
  min-height: 64px;
}

.account-panel-content {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 18px;
  padding: 16px 18px;
  background: rgba(46, 16, 102, 0.62);
  border: 2px solid rgba(196, 132, 252, 0.28);
  border-radius: 12px;
  box-shadow: 0 10px 26px rgba(0,0,0,0.26);
  flex-wrap: wrap;
}

.account-identity {
  min-width: 180px;
  display: flex;
  align-items: center;
  gap: 12px;
}

.account-avatar {
  width: 48px;
  height: 48px;
  flex: 0 0 auto;
  border-radius: 50%;
  display: grid;
  place-items: center;
  overflow: hidden;
  background: linear-gradient(135deg, #f3e8ff, #a78bfa);
  border: 2px solid rgba(255,255,255,0.5);
  color: #2e1065;
  font-size: 18px;
  font-weight: 900;
  box-shadow: 0 6px 16px rgba(0,0,0,0.22);
  text-decoration: none;
}

.account-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.account-copy {
  min-width: 0;
}

.account-label,
.account-subtext {
  display: block;
  color: #ddd6fe;
  font-size: 13px;
  line-height: 1.25;
}

.account-name {
  display: block;
  color: #fff;
  font-size: 20px;
  font-weight: 900;
  line-height: 1.15;
}

.account-actions {
  display: flex;
  align-items: stretch;
  justify-content: flex-end;
  gap: 10px;
  flex-wrap: wrap;
}

.account-action {
  min-width: 118px;
  min-height: 48px;
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  padding: 9px 14px;
  border: 0;
  border-radius: 8px;
  background: #f3e8ff;
  color: #2e1065;
  font-weight: 800;
  cursor: pointer;
  text-decoration: none;
  box-shadow: 0 5px 14px rgba(0,0,0,0.2);
}

.account-action:hover {
  background: #fff;
  transform: translateY(-1px);
}

.account-action-title {
  display: block;
  font-size: 14px;
  line-height: 1.1;
}

.account-action-detail {
  display: block;
  color: #5b21b6;
  font-size: 12px;
  line-height: 1.1;
}

.account-action.logout {
  background: rgba(255,255,255,0.12);
  border: 1px solid rgba(255,255,255,0.24);
  color: #fff;
}

.account-action.logout:hover {
  background: rgba(255,255,255,0.2);
}

.home-action-panel {
  width: min(100%, 900px);
  display: grid;
  gap: 10px;
  padding: 16px;
  border-radius: 12px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.24);
  box-shadow: 0 10px 24px rgba(0,0,0,0.22);
}

.home-action-panel[hidden] {
  display: none;
}

.home-action-title {
  margin: 0;
  text-align: center;
  color: #fff;
  font-size: 20px;
  font-weight: 950;
  letter-spacing: 0;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9),
    0 0 12px rgba(216, 180, 254, 0.6);
}

.home-action-list {
  display: grid;
  gap: 8px;
}

.home-action-row {
  display: grid;
  grid-template-columns: minmax(150px, 1fr) repeat(2, minmax(132px, 0.45fr)) auto;
  gap: 8px;
  align-items: center;
  padding: 10px;
  border-radius: 8px;
  background: rgba(46, 16, 102, 0.5);
  border: 1px solid rgba(216, 180, 254, 0.18);
}

.home-action-row strong {
  color: #fff;
}

.home-action-status-line {
  display: inline-flex;
  justify-content: center;
  align-items: center;
  gap: 5px;
  color: #fff;
  font-weight: 900;
  text-align: center;
}

.home-action-status-line strong {
  color: #fff;
}

.home-action-status {
  font-weight: 950;
  text-align: center;
}

.home-action-status.complete {
  color: #19ff7a;
  text-shadow: 0 0 10px rgba(34, 255, 136, 0.42);
}

.home-action-status.required {
  color: #ff3b3b;
  text-shadow: 0 0 10px rgba(255, 59, 59, 0.42);
}

.home-action-row a {
  color: #fff;
  font-weight: 900;
  text-decoration: none;
  padding: 8px 10px;
  border-radius: 999px;
  background: rgba(124, 58, 237, 0.72);
  text-align: center;
}

/* ===== MENU BUTTONS ===== */
.menu {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 18px;
  max-width: 720px;
  width: 100%;
}

.menu button {
  min-height: 174px;
  padding: 28px 24px;
  font-size: 20px;
  font-weight: 950;
  border: none;
  border-radius: 10px;
  cursor: pointer;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.13), transparent 34%),
    linear-gradient(145deg, rgba(17, 7, 38, 0.96), rgba(49, 18, 91, 0.92) 58%, rgba(76, 29, 149, 0.86));
  color: #fff;
  box-shadow: 0 16px 36px rgba(0,0,0,0.42), inset 0 1px 0 rgba(255,255,255,0.14);
  transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease, background 0.22s ease;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 13px;
  text-align: center;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(216, 180, 254, 0.32);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 0 16px rgba(255,255,255,0.32);
}

.menu button::before {
  content: '';
  position: absolute;
  inset: -40% auto auto -18%;
  width: 130px;
  height: 220px;
  background: linear-gradient(135deg, rgba(255,255,255,0.18), transparent);
  transform: rotate(22deg);
  transition: transform 0.28s ease, opacity 0.28s ease;
  opacity: 0.72;
}

.menu button::after {
  content: '';
  position: absolute;
  inset: auto 16px 14px;
  height: 4px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(216, 180, 254, 0.12), #f5d76e, rgba(216, 180, 254, 0.12));
  box-shadow: 0 0 18px rgba(245, 215, 110, 0.34);
}

.menu button:hover::before {
  transform: rotate(22deg) translateX(24px);
  opacity: 0.95;
}

.menu button:hover {
  transform: translateY(-5px);
  background:
    linear-gradient(135deg, rgba(255,255,255,0.16), transparent 34%),
    linear-gradient(145deg, rgba(24, 10, 54, 0.98), rgba(67, 28, 127, 0.94) 58%, rgba(91, 33, 182, 0.9));
  box-shadow: 0 22px 44px rgba(0,0,0,0.48), 0 0 24px rgba(216, 180, 254, 0.26);
}

.menu button:active {
  transform: translateY(-1px);
  box-shadow: 0 8px 15px rgba(0,0,0,0.3);
}

.menu button[hidden] {
  display: none;
}

.menu button.admin-access {
  min-height: 128px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.1), transparent 34%),
    linear-gradient(145deg, rgba(17, 7, 38, 0.96), rgba(74, 29, 92, 0.92));
  border-color: rgba(253, 224, 71, 0.4);
}

.menu button.admin-access:hover {
  background:
    linear-gradient(135deg, rgba(255,255,255,0.14), transparent 34%),
    linear-gradient(145deg, rgba(28, 13, 58, 0.98), rgba(93, 35, 111, 0.95));
}

/* ===== ICON STYLING ===== */
.menu svg {
  width: 40px;
  height: 40px;
  fill: #f5f3ff;
  filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
  transition: transform 0.3s ease;
}

.menu button:hover svg {
  transform: scale(1.15) rotate(5deg);
}

/* ===== ICON CONTAINER ===== */
.icon-container {
  display: flex;
  justify-content: center;
  gap: 10px;
  align-items: center;
}

/* ===== FOOTER ===== */
footer {
  text-align: center;
  padding: 25px 20px;
  color: #d8b4fe;
  font-size: 14px;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
  background: rgba(0,0,0,0.1);
}

/* ===== RESPONSIVE - TABLET ===== */
@media (max-width: 1024px) {
  .menu {
    grid-template-columns: repeat(2, 1fr);
    gap: 20px;
    padding: 0 10px;
  }

  .menu button {
    padding: 25px 20px;
    font-size: 16px;
  }

  .menu svg {
    width: 35px;
    height: 35px;
  }
}

/* ===== RESPONSIVE - MOBILE ===== */
@media (max-width: 768px) {
  header {
    flex-direction: column;
    gap: 15px;
    padding: 20px 15px;
  }

  header img {
    height: 50px;
  }

  header h1 {
    margin: 0;
  }

  .container {
    padding: 30px 15px;
  }

  .account-panel-content {
    justify-content: center;
    text-align: center;
  }

  .account-identity {
    justify-content: center;
  }

  .account-actions {
    width: 100%;
    justify-content: center;
  }

  .home-action-row {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .menu {
    grid-template-columns: 1fr;
    gap: 18px;
  }

  .menu button {
    min-height: 142px;
    padding: 24px 20px;
    font-size: 16px;
    gap: 12px;
  }

  .menu svg {
    width: 32px;
    height: 32px;
  }

  footer {
    font-size: 12px;
    padding: 20px 15px;
  }
}

/* ===== RESPONSIVE - SMALL MOBILE ===== */
@media (max-width: 480px) {
  header img {
    height: 45px;
  }

  .container {
    padding: 20px 10px;
  }

  .account-panel-content {
    padding: 14px;
  }

  .account-action {
    flex: 1 1 100%;
    width: 100%;
  }

  .menu {
    gap: 15px;
  }

  .menu button {
    min-height: 126px;
    padding: 20px 15px;
    font-size: 15px;
    gap: 10px;
    border-radius: 12px;
  }

  .menu svg {
    width: 28px;
    height: 28px;
  }

  footer {
    font-size: 11px;
    padding: 15px 10px;
  }
}

/* ===== LANDSCAPE MODE ===== */
@media (max-height: 500px) and (orientation: landscape) {
  header {
    padding: 12px 20px;
  }

  .container {
    padding: 15px 20px;
  }

  .menu button {
    padding: 15px 20px;
    font-size: 14px;
  }

  .menu svg {
    width: 28px;
    height: 28px;
  }

  footer {
    padding: 10px 20px;
    font-size: 11px;
  }
}
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>
</head>

<!-- ===== FOOTER ===== -->
