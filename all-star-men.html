<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Player Star Men</title>
<style>
* { box-sizing: border-box; }
body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
  overflow-x: hidden;
}
header {
  padding: 16px 14px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.42);
}
header h1 {
  margin: 0;
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.3px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85);
  font-size: clamp(1.8rem, 4vw, 2.8rem);
  line-height: 1.05;
}
main {
  width: min(920px, 100%);
  margin: 0 auto;
  padding: 10px 10px 18px;
}
.toolbar,
.player-pills {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}
.toolbar { margin-bottom: 8px; }
.toolbar a {
  min-height: 34px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 900;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 7px 10px;
  text-align: center;
  white-space: nowrap;
}
.toolbar a.star-back-link {
  color: #fff;
  background: linear-gradient(135deg, #b45309, #facc15);
  border-color: rgba(254, 240, 138, 0.82);
  box-shadow: 0 0 14px rgba(250, 204, 21, 0.32);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.72),
    1px -1px 0 rgba(0,0,0,0.72),
    -1px 1px 0 rgba(0,0,0,0.72),
    1px 1px 0 rgba(0,0,0,0.72);
}
.panel {
  display: grid;
  gap: 8px;
  padding: 12px;
  border-radius: 10px;
  background: rgba(46, 16, 102, 0.66);
  border: 2px solid rgba(196, 132, 252, 0.32);
  box-shadow: 0 12px 28px rgba(0,0,0,0.26);
}
.page-head {
  text-align: center;
  display: grid;
  gap: 3px;
}
.page-head h2 {
  margin: 0;
  font-size: clamp(1.25rem, 3vw, 1.9rem);
}
.page-head p {
  margin: 0;
  color: #ddd6fe;
  font-weight: 800;
}
.player-pills {
  padding: 4px 0;
}
.player-pill {
  width: 48px;
  height: 48px;
  display: grid;
  place-items: center;
  border: 2px solid rgba(216, 180, 254, 0.24);
  border-radius: 999px;
  background: rgba(17, 7, 38, 0.7);
  color: #fff;
  font-weight: 950;
  cursor: pointer;
  overflow: hidden;
}
.player-pill.active {
  border-color: #facc15;
  box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
}
.player-pill img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.star-list {
  display: grid;
  gap: 4px;
}
.star-row {
  min-height: 28px;
  display: grid;
  grid-template-columns: 44px minmax(0, 1fr) 32px auto;
  gap: 6px;
  align-items: center;
  padding: 4px 7px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
  white-space: nowrap;
}
.star-row span {
  min-width: 0;
}
.gw-badge {
  justify-self: center;
  color: #fde68a;
  font-size: 11px;
  font-weight: 950;
}
.star-choice {
  display: inline-flex;
  align-items: center;
  justify-self: start;
  gap: 6px;
  min-width: 0;
  max-width: 100%;
  overflow: hidden;
  font-size: 13px;
  font-weight: 900;
}
.star-name {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
}
.star-icons {
  display: inline-flex;
  align-items: center;
  justify-content: flex-start;
  gap: 2px;
  flex: 0 0 auto;
  font-size: 13px;
}
.card-icon {
  width: 0.74em;
  height: 1em;
  display: inline-block;
  border: 1px solid rgba(0,0,0,0.7);
  border-radius: 2px;
  box-shadow: 0 0 4px rgba(0,0,0,0.28);
}
.card-icon.yellow { background: #facc15; }
.card-icon.red { background: #ef4444; }
.star-points-badge {
  width: 28px;
  height: 28px;
  display: inline-grid;
  place-items: center;
  justify-self: center;
  border-radius: 999px;
  border: 1px solid rgba(255, 247, 173, 0.86);
  background: radial-gradient(circle at 34% 28%, #fff7ad 0%, #facc15 42%, #d97706 78%, #78350f 100%);
  color: #fff;
  font-size: 13px;
  font-weight: 950;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.82),
    1px -1px 0 rgba(0,0,0,0.82),
    -1px 1px 0 rgba(0,0,0,0.82),
    1px 1px 0 rgba(0,0,0,0.82);
  box-shadow: 0 0 12px rgba(250, 204, 21, 0.55), inset 0 0 5px rgba(255,255,255,0.22);
}
.star-points-badge.negative {
  border-color: rgba(254, 202, 202, 0.95);
  background: radial-gradient(circle at 34% 28%, #fecaca 0%, #ef4444 44%, #991b1b 100%);
  box-shadow: 0 0 12px rgba(239, 68, 68, 0.58), inset 0 0 5px rgba(255,255,255,0.22);
}
.star-effects {
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  min-width: 28px;
}
.curse-marker,
.power-marker {
  width: 25px;
  height: 25px;
  min-width: 25px;
  min-height: 25px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  flex: 0 0 auto;
  justify-self: end;
  padding: 0;
  border-radius: 999px;
  border: 1px solid rgba(254, 202, 202, 0.9);
  background: radial-gradient(circle at 34% 22%, #fecaca 0%, #ff1f1f 40%, #7f1d1d 100%);
  color: #fff;
  font-size: 16px;
  font-weight: 950;
  line-height: 1;
  cursor: pointer;
  box-sizing: border-box;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92);
  box-shadow: 0 0 12px rgba(255, 31, 31, 0.64), inset 0 0 6px rgba(255,255,255,0.24);
}
.curse-marker span,
.power-marker span {
  width: 100%;
  height: 100%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  line-height: 1;
  transform: translate(-0.6px, -0.4px);
}
.power-marker span {
  transform: translate(-0.6px, 0);
}
.power-marker {
  border-color: rgba(191, 219, 254, 0.9);
  background: radial-gradient(circle at 34% 22%, #e0f2fe 0%, #0284c7 40%, #075985 100%);
  box-shadow: 0 0 12px rgba(14, 165, 233, 0.64), inset 0 0 6px rgba(255,255,255,0.24);
}
.curse-marker:hover,
.power-marker:hover {
  transform: translateY(-1px) scale(1.05);
  box-shadow: 0 0 16px rgba(255, 31, 31, 0.82), inset 0 0 7px rgba(255,255,255,0.28);
}
.power-marker:hover {
  box-shadow: 0 0 16px rgba(14, 165, 233, 0.82), inset 0 0 7px rgba(255,255,255,0.28);
}
.star-row.unlocked {
  opacity: 0.74;
}
.star-row.empty .star-choice {
  color: #ddd6fe;
}
.state-text {
  margin: 0;
  color: #ddd6fe;
  text-align: center;
  line-height: 1.35;
}
.curse-modal {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  padding: 18px;
  background: rgba(8, 3, 20, 0.54);
  backdrop-filter: blur(7px);
  z-index: 1000;
}
.curse-modal.show {
  display: grid;
}
.curse-panel {
  width: min(1040px, calc(100vw - 24px));
  max-height: calc(100vh - 24px);
  overflow: auto;
  display: grid;
  gap: 12px;
  justify-items: center;
  border-radius: 16px;
  padding: 14px 12px 18px;
  background: transparent;
  border: 0;
  box-shadow: none;
  text-align: center;
}
.curse-panel h2 {
  margin: 0;
  color: #fff;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 16px rgba(248, 113, 113, 0.82);
}
.curse-card-list {
  display: flex;
  gap: 12px;
  justify-content: center;
  align-items: flex-start;
  align-content: center;
  flex-wrap: wrap;
  width: 100%;
  max-width: 100%;
  margin-inline: auto;
  overflow-x: hidden;
  overflow-y: auto;
  padding: 2px 2px 8px;
}
.curse-card-wrap {
  display: grid;
  gap: 9px;
  justify-items: center;
}
.curse-card-played-by {
  color: #fff;
  font-weight: 950;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 12px rgba(251, 113, 133, 0.7);
}
.curse-detail-card {
  width: 220px;
  height: 310px;
  min-height: 310px;
  display: flex;
  flex-direction: column;
  gap: 0;
  border-radius: 18px;
  padding: 18px 14px;
  text-align: center;
  color: #fff;
  position: relative;
  overflow: hidden;
  border: 3px solid #fb7185;
  background: linear-gradient(135deg, #4c0519 0%, #991b1b 24%, #ef4444 50%, #be123c 72%, #fecaca 100%);
  box-shadow: 0 0 30px rgba(251, 113, 133, 0.68), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 22px rgba(255,255,255,0.16);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 2px 5px rgba(0,0,0,0.78);
}
.curse-detail-card.power-detail-card {
  border-color: #7dd3fc;
  background: linear-gradient(135deg, #0c4a6e 0%, #0284c7 24%, #38bdf8 50%, #0ea5e9 72%, #bae6fd 100%);
  box-shadow: 0 0 30px rgba(56, 189, 248, 0.68), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 22px rgba(255,255,255,0.18);
}
.curse-detail-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 28%),
    linear-gradient(42deg, rgba(255,255,255,0.12) 0 12%, transparent 12% 27%, rgba(255,255,255,0.09) 27% 38%, transparent 38% 100%);
  pointer-events: none;
}
.curse-detail-card strong,
.curse-detail-card p {
  position: relative;
  z-index: 1;
}
.curse-detail-card strong {
  min-height: 0;
  flex: 0 0 22%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  padding: 0 2px 8px;
  color: #fff;
  font-size: clamp(1rem, 1.8vw, 1.18rem);
  line-height: 1.18;
  font-weight: 950;
}
.curse-detail-card p {
  flex: 1 1 78%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  padding: 0 2px;
  color: #fff;
  font-size: clamp(0.68rem, 1.1vw, 0.82rem);
  font-weight: 850;
  line-height: 1.35;
  overflow-y: auto;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}
.curse-close {
  justify-self: center;
  min-width: 120px;
  min-height: 42px;
  padding: 12px 24px;
  background: linear-gradient(135deg, #2e1065, #4c1d95);
  color: #fff;
  border: 1px solid rgba(216, 180, 254, 0.26);
  border-radius: 8px;
  font-size: 15px;
  font-weight: 850;
  cursor: pointer;
  box-shadow: 0 4px 14px rgba(17, 7, 38, 0.42);
  transition: all 0.3s ease;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92);
}
.curse-close:hover {
  background: linear-gradient(135deg, #4c1d95, #6d28d9);
  transform: translateY(-2px);
}
@media (min-width: 651px) {
  .curse-panel {
    width: min(1380px, calc(100vw - 16px));
    max-height: none;
    overflow: visible;
    gap: 12px;
    padding: 12px 10px 16px;
  }

  .curse-card-list {
    gap: 8px;
    justify-content: center;
    align-items: flex-start;
    align-content: center;
    flex-wrap: wrap;
    overflow: visible;
    padding: 0;
    max-width: 1500px;
  }

  .curse-card-wrap {
    flex: 0 0 170px;
    gap: 6px;
  }

  .curse-card-played-by {
    max-width: 170px;
    font-size: clamp(10px, 0.8vw, 12px);
    line-height: 1.08;
  }

  .curse-detail-card {
    width: 170px;
    height: 252px;
    min-height: 252px;
    border-width: 2px;
    border-radius: 15px;
    padding: 13px 9px;
  }

  .curse-detail-card strong {
    font-size: 0.88rem;
    line-height: 1.12;
    padding-bottom: 6px;
  }

  .curse-detail-card p {
    font-size: 0.62rem;
    line-height: 1.2;
  }
}
footer {
  text-align: center;
  padding: 12px;
  color: #4c1d95;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
  font-size: 12px;
}
@media (max-width: 650px) {
  header h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    white-space: nowrap !important;
  }
  main { padding: 7px; }
  .toolbar {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 6px;
    width: min(100%, 460px);
    margin: 0 auto 7px;
  }
  .toolbar a {
    min-height: 30px;
    padding: 6px 5px;
    font-size: 12px;
    line-height: 1.05;
  }
  .panel { padding: 8px; gap: 6px; }
  .player-pill { width: 40px; height: 40px; }
  .star-row {
    min-height: 25px;
    grid-template-columns: 38px minmax(0, 1fr) 28px auto;
    gap: 4px;
    padding: 3px 5px;
  }
  .star-choice { font-size: 11px; }
  .star-icons { font-size: 11px; }
  .star-points-badge {
    width: 24px;
    height: 24px;
    font-size: 11px;
  }
  .curse-marker,
  .power-marker {
    width: 22px;
    height: 22px;
    min-width: 22px;
    min-height: 22px;
    font-size: 14px;
  }
  .curse-panel {
    width: calc(100vw - 12px);
    max-height: calc(100vh - 12px);
    overflow: auto;
    gap: 9px;
    padding: 10px 6px 14px;
  }
  .curse-card-list {
    justify-content: center;
    align-items: flex-start;
    align-content: flex-start;
    flex-wrap: wrap;
    gap: 9px;
    overflow-x: hidden;
    overflow-y: auto;
    max-height: calc(100vh - 122px);
    max-width: min(100%, 560px);
    padding-bottom: 8px;
  }
  .curse-card-wrap {
    flex: 0 1 clamp(92px, 28vw, 112px);
    gap: 6px;
  }
  .curse-detail-card {
    width: clamp(92px, 28vw, 112px);
    height: clamp(136px, 40vw, 164px);
    min-height: clamp(136px, 40vw, 164px);
    border-width: 2px;
    border-radius: 12px;
    padding: 8px 6px;
  }
  .curse-card-played-by {
    max-width: 112px;
    font-size: 8px;
    line-height: 1.04;
  }
  .curse-detail-card strong {
    font-size: 0.62rem;
    line-height: 1.04;
    padding-bottom: 4px;
  }
  .curse-detail-card p {
    font-size: 0.43rem;
    line-height: 1.1;
  }
  .curse-close {
    min-width: 96px;
    width: 96px;
    padding-left: 14px;
    padding-right: 14px;
    justify-self: center;
  }
}
</style>
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - Player Star Men</h1>
</header>

<main>
  <div class="toolbar">
    <a data-league-back href="league.html">Back To League Hub</a>
    <a class="star-back-link" data-star-back href="star-man-hub.html">Back To Star Man</a>
  </div>

  <section class="panel">
    <div class="page-head">
      <h2 data-view-title>Loading Star Men...</h2>
      <p data-view-subtitle>Checking locked gameweeks.</p>
    </div>
    <div class="player-pills" data-player-pills></div>
    <div class="star-list" data-star-men-list>
      <p class="state-text">Loading...</p>
    </div>
  </section>
</main>

<div class="curse-modal" data-star-curse-modal aria-hidden="true">
  <div class="curse-panel" role="dialog" aria-modal="true" aria-label="Star Man curse">
    <h2>Active Curse</h2>
    <div class="curse-card-list" data-star-curse-modal-body></div>
    <button class="curse-close" type="button" data-close-star-curse>Close</button>
  </div>
</div>

<footer>2026 Prem Predics | Player Star Men</footer>
<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/all-star-men.js"></script>
</body>
</html>
