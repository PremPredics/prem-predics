<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Correct Scores</title>
<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #4c1d95, #7c3aed, #1e0f3d);
  color: #f3f4f6;
  margin: 0;
  padding: 0;
  text-align: center;
}

header {
  padding: 20px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85),
    0 0 24px rgba(124, 58, 237, 0.55);
  margin: 0;
  font-size: clamp(2rem, 5.5vw, 3.35rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

section {
  margin: 40px auto;
  max-width: 800px;
  text-align: center;
}

.image-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 20px;
}

.image-container img {
  max-width: 80%;
  border: 4px solid #a78bfa;
  border-radius: 12px;
}

footer {
  margin-top: 50px;
  padding: 20px;
  border-top: 1px solid #a78bfa;
  color: #d8b4fe;
}

/* Back Button Styling */
.back-btn {
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #7c3aed;
  color: white;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  transition: 0.3s;
  margin-top: 20px;
}

.back-btn:hover {
  background: #a78bfa;
  transform: translateY(-2px);
}

.back-btn:active {
  transform: translateY(1px);
}
</style>
</head>
<body>

<header>
  <h1>Prem Predics - Correct Scores</h1>
</header>

<!-- Image and Back Button Container -->
<div class="image-container">
  <img src="correct-scores.png" alt="Correct Scores">
  <button class="back-btn" onclick="location.href='index.html'">← Back to Homepage</button>
</div>

<footer>&copy; 2026 Prem Predics | Correct Scores</footer>

</body>
</html>
