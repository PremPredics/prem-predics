<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Correct Scores</title>
<script src="assets/js/capacitor-app.js"></script>
<style>
* { box-sizing: border-box; }

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
}

header {
  padding: 24px 16px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85),
    0 0 24px rgba(124, 58, 237, 0.55);
  margin: 0;
  font-size: clamp(2rem, 5.5vw, 3.35rem);
  line-height: 1.05;
  font-weight: 900;
}

html.capacitor-android header {
  padding:
    max(16px, calc(env(safe-area-inset-top, 0px) + 12px))
    12px
    12px;
}

html.capacitor-android header h1 {
  font-size: clamp(1.45rem, 6vw, 2rem);
  line-height: 1.05;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

main {
  width: min(1320px, 100%);
  margin: 0 auto;
  padding: 28px 14px 44px;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 900;
  background: rgba(17, 7, 38, 0.72);
  border: 1px solid rgba(216, 180, 254, 0.32);
  border-radius: 8px;
  padding: 10px 13px;
}

.scores-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
  gap: 14px;
}

.correct-panel {
  width: min(900px, 100%);
  margin: 0 auto;
  display: grid;
  gap: 12px;
  padding: 14px;
  border-radius: 12px;
  background: rgba(46, 16, 102, 0.68);
  border: 2px solid rgba(196, 132, 252, 0.32);
  box-shadow: 0 14px 34px rgba(0,0,0,0.28);
}

.player-pills {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
  padding: 4px 0;
}

.player-pill {
  width: 48px;
  height: 48px;
  display: grid;
  place-items: center;
  border: 2px solid rgba(216, 180, 254, 0.24);
  border-radius: 999px;
  background: rgba(17, 7, 38, 0.7);
  color: #fff;
  font-weight: 950;
  cursor: pointer;
  overflow: hidden;
}

.player-pill.active {
  border-color: #facc15;
  box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
}

.player-pill img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.correct-score-title {
  margin: 0;
  text-align: center;
  color: #fff;
  font-size: clamp(1.25rem, 3vw, 1.9rem);
  font-weight: 950;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 0 14px rgba(216, 180, 254, 0.55);
}

.correct-score-list {
  display: grid;
  gap: 6px;
}

.correct-score-row {
  min-height: 34px;
  display: grid;
  grid-template-columns: 54px minmax(0, 1fr);
  gap: 8px;
  align-items: center;
  padding: 6px 8px;
  border-radius: 999px;
  background: rgba(17, 7, 38, 0.5);
  border: 1px solid rgba(250, 204, 21, 0.34);
}

.correct-score-row.has-effects {
  grid-template-columns: 54px minmax(0, 1fr) auto;
}

.correct-fixture {
  grid-column: 2;
  grid-row: 1;
  min-width: 0;
  display: grid;
  grid-template-columns: minmax(0, 1fr) 58px minmax(0, 1fr);
  gap: 8px;
  align-items: center;
  text-align: center;
  color: #ffd700;
  font-size: 14px;
  font-weight: 950;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-shadow: 0 0 10px rgba(250, 204, 21, 0.42);
}

.correct-team {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.correct-home {
  text-align: right;
}

.correct-away {
  text-align: left;
}

.correct-scoreline {
  text-align: center;
  color: #fff3a3;
  font-size: 15px;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.82),
    1px -1px 0 rgba(0,0,0,0.82),
    -1px 1px 0 rgba(0,0,0,0.82),
    1px 1px 0 rgba(0,0,0,0.82),
    0 0 12px rgba(250, 204, 21, 0.56);
}

.correct-gw-pill {
  min-width: 48px;
  justify-self: start;
  grid-column: 1;
  grid-row: 1;
  border-radius: 999px;
  padding: 3px 8px;
  background: rgba(120, 53, 15, 0.72);
  border: 1px solid rgba(250, 204, 21, 0.72);
  color: #fde68a;
  font-size: 12px;
  font-weight: 950;
  text-align: center;
  box-shadow: 0 0 10px rgba(250, 204, 21, 0.22);
}

.correct-effects {
  grid-column: 3;
  grid-row: 1;
  display: inline-flex;
  align-items: center;
  justify-content: flex-end;
  gap: 4px;
  min-width: 30px;
}

.effect-marker {
  width: 29px;
  height: 29px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.9);
  color: #fff;
  cursor: pointer;
  font-size: 17px;
  line-height: 1;
  font-weight: 950;
  padding: 0;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9);
  box-shadow: 0 0 13px rgba(255,255,255,0.2), inset 0 0 8px rgba(255,255,255,0.14);
}

.curse-marker {
  background: linear-gradient(135deg, #7f1d1d, #ef4444 54%, #fb7185);
  box-shadow: 0 0 16px rgba(239, 68, 68, 0.64), inset 0 0 8px rgba(255,255,255,0.16);
}

.power-marker {
  background: linear-gradient(135deg, #075985, #0284c7 54%, #7dd3fc);
  box-shadow: 0 0 16px rgba(14, 165, 233, 0.64), inset 0 0 8px rgba(255,255,255,0.16);
}

.effect-marker:hover {
  transform: translateY(-1px);
  filter: brightness(1.08);
}

.player-card {
  display: grid;
  gap: 12px;
  padding: 16px;
  border-radius: 12px;
  background: rgba(46, 16, 102, 0.68);
  border: 2px solid rgba(196, 132, 252, 0.32);
  box-shadow: 0 14px 34px rgba(0,0,0,0.28);
}

.player-head {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  text-align: center;
}

.avatar {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  overflow: hidden;
  border-radius: 50%;
  background: linear-gradient(135deg, #f3e8ff, #a78bfa);
  color: #2e1065;
  border: 2px solid rgba(255,255,255,0.65);
  font-weight: 900;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.player-head h2 {
  margin: 0;
  font-size: 1.25rem;
}

.score-list {
  display: grid;
  gap: 8px;
}

.score-row {
  display: grid;
  grid-template-columns: 58px minmax(220px, 1fr) 62px;
  gap: 8px;
  align-items: center;
  min-height: 44px;
  padding: 8px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
}

.score-row strong {
  color: #fde68a;
  text-align: center;
}

.score-row span {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  font-weight: 800;
}

.empty {
  margin: 0;
  padding: 16px;
  text-align: center;
  color: #ddd6fe;
}

footer {
  text-align: center;
  padding: 20px;
  color: #4c1d95;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
}

.card-effect-modal {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  padding: 20px 20px 86px;
  background: rgba(8, 3, 20, 0.56);
  backdrop-filter: blur(8px);
  z-index: 1000;
}

.card-effect-modal.show {
  display: grid;
}

body.card-modal-open {
  overflow: hidden;
}

.card-effect-panel {
  width: min(330px, 100%);
  height: min(430px, calc(100vh - 116px));
  min-height: 0;
  display: flex;
  flex-direction: column;
  border-radius: 18px;
  padding: 24px 20px;
  text-align: center;
  border: 3px solid #7dd3fc;
  background: linear-gradient(135deg, #0c4a6e 0%, #0284c7 24%, #38bdf8 50%, #0ea5e9 72%, #bae6fd 100%);
  box-shadow: 0 0 30px rgba(56, 189, 248, 0.68), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 22px rgba(255,255,255,0.18);
  color: #fff;
  position: relative;
  overflow: visible;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 2px 5px rgba(0,0,0,0.78);
}

.card-effect-panel.curse-card {
  border-color: #fb7185;
  background: linear-gradient(135deg, #4c0519 0%, #991b1b 24%, #ef4444 50%, #be123c 72%, #fecaca 100%);
  box-shadow: 0 0 30px rgba(251, 113, 133, 0.68), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 22px rgba(255,255,255,0.16);
}

.card-effect-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 28%),
    linear-gradient(42deg, rgba(255,255,255,0.12) 0 12%, transparent 12% 27%, rgba(255,255,255,0.09) 27% 38%, transparent 38% 100%);
  pointer-events: none;
}

.card-effect-panel h2,
.card-effect-panel p,
.card-effect-panel small {
  position: relative;
  z-index: 1;
}

.card-effect-panel h2 {
  min-height: 0;
  flex: 0 0 22%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  padding: 0 2px 8px;
  font-size: clamp(1.18rem, 2.6vw, 1.46rem);
  line-height: 1.18;
}

.card-effect-panel p {
  flex: 1 1 68%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  color: #fff;
  font-size: clamp(0.78rem, 1.45vw, 0.95rem);
  font-weight: 850;
  line-height: 1.35;
  overflow-y: auto;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

.card-effect-panel small {
  color: #fff;
  font-weight: 950;
}

.card-effect-player-line {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}

.card-effect-player-line .played-by-avatar {
  width: 24px;
  height: 24px;
  display: inline-grid;
  place-items: center;
  overflow: hidden;
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.92);
  background: rgba(255,255,255,0.88);
  color: #2e1065;
  font-size: 0.72rem;
  font-weight: 950;
  text-shadow: none;
}

.card-effect-player-line .played-by-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.card-effect-back {
  position: absolute;
  left: 50%;
  bottom: -62px;
  transform: translateX(-50%);
  width: min(220px, 100%);
  min-height: 42px;
  border-radius: 12px;
  padding: 10px 16px;
  background: linear-gradient(135deg, #4c1d95, #7c3aed);
  color: #fff;
  font-weight: 950;
  cursor: pointer;
  border: 3px solid rgba(233, 213, 255, 0.98);
  z-index: 2;
  box-shadow: 0 12px 30px rgba(76, 29, 149, 0.56), 0 0 24px rgba(167, 139, 250, 0.42);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95);
}

@media (max-width: 640px) {
  main { padding: 22px 10px 34px; }
  .toolbar a { flex: 1; text-align: center; }
  .scores-grid { grid-template-columns: 1fr; }
  .score-row { grid-template-columns: 54px minmax(0, 1fr) 58px; }
  .correct-panel {
    padding: 10px;
    gap: 10px;
  }
  .player-pill {
    width: 40px;
    height: 40px;
  }
  .correct-score-row {
    min-height: 31px;
    padding: 5px 6px;
    gap: 5px;
  }
  .correct-score-row.has-effects {
    grid-template-columns: 42px minmax(0, 1fr) auto;
  }
  .correct-fixture {
    grid-template-columns: minmax(0, 1fr) 44px minmax(0, 1fr);
    gap: 5px;
    font-size: 12px;
  }
  .correct-scoreline {
    font-size: 12px;
  }
  .correct-gw-pill {
    min-width: 42px;
    padding: 3px 6px;
    font-size: 11px;
  }
  .correct-effects {
    min-width: 26px;
    gap: 2px;
  }
  .effect-marker {
    width: 25px;
    height: 25px;
    font-size: 14px;
  }
}
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#7b61d8">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Prem Predics">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="assets/pwa/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="assets/pwa/favicon-32.png">
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - Correct Scores</h1>
</header>

<main>
  <div class="toolbar">
    <a data-league-link href="league.html">Back To League Hub</a>
  </div>

  <section class="correct-panel">
    <div class="player-pills" data-player-pills></div>
    <h2 class="correct-score-title" data-correct-score-title>Correct Scores</h2>
    <div class="correct-score-list" data-correct-scores>
      <p class="empty">Loading correct scores...</p>
    </div>
  </section>
</main>

<div class="card-effect-modal" data-card-effect-modal aria-hidden="true">
  <article class="card-effect-panel" data-card-effect-panel role="dialog" aria-modal="true" aria-label="Card effect">
    <h2 data-card-effect-title>Card</h2>
    <p data-card-effect-description></p>
    <small data-card-effect-player></small>
    <button class="card-effect-back" type="button" data-close-card-effect>Back</button>
  </article>
</div>

<footer>2026 Prem Predics | Correct Scores</footer>

<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/correct-scores.js"></script>
<script src="assets/js/pwa.js" defer></script>
<script src="assets/js/wider-polish.js" defer></script>
<script src="assets/js/legal-footer.js" defer></script>
</body>
</html>
