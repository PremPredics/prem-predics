<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Game Card</title>
<style>
* { box-sizing: border-box; }

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
}

header {
  padding: 24px 16px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85),
    0 0 24px rgba(124, 58, 237, 0.55);
  margin: 0;
  font-size: clamp(2rem, 5.5vw, 3.35rem);
  line-height: 1.05;
  font-weight: 900;
}

main {
  width: min(1080px, 100%);
  margin: 0 auto;
  padding: 28px 14px 44px;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 900;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 10px 13px;
}

.panel {
  background: rgba(46, 16, 102, 0.68);
  border: 2px solid rgba(196, 132, 252, 0.32);
  border-radius: 12px;
  padding: 18px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.28);
}

.round-list {
  display: grid;
  gap: 16px;
}

.round-panel {
  display: grid;
  gap: 14px;
  padding: 14px;
  border-radius: 10px;
  background: rgba(17, 7, 38, 0.28);
  border: 1px solid rgba(216, 180, 254, 0.22);
}

.round-panel.history {
  opacity: 0.92;
}

.round-label {
  justify-self: center;
  border-radius: 999px;
  padding: 6px 11px;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.26);
  color: #fde68a;
  font-weight: 900;
}

.active-card-layout {
  display: grid;
  grid-template-columns: 170px minmax(0, 1fr);
  gap: 18px;
  align-items: center;
  margin-bottom: 18px;
}

.game-card-visual {
  width: 150px;
  aspect-ratio: 0.72;
  margin: 0 auto;
  display: grid;
  place-items: center;
  padding: 12px;
  border: 3px solid #6ee7b7;
  border-radius: 12px;
  background: linear-gradient(135deg, #052e16 0%, #047857 24%, #10b981 50%, #059669 72%, #a7f3d0 100%);
  color: #fff;
  text-align: center;
  font-weight: 900;
  box-shadow: 0 0 22px rgba(110, 231, 183, 0.62), 0 12px 26px rgba(0,0,0,0.34), inset 0 0 14px rgba(255,255,255,0.14);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9);
}

.card-copy {
  text-align: center;
}

.card-copy h2 {
  margin: 0 0 8px;
  font-size: clamp(1.5rem, 4vw, 2.3rem);
}

.card-copy p {
  margin: 0 0 8px;
  color: #ddd6fe;
  line-height: 1.5;
}

.range-pill {
  display: inline-block;
  margin: 10px 0;
  border-radius: 999px;
  padding: 7px 12px;
  background: rgba(16, 185, 129, 0.18);
  border: 1px solid rgba(110, 231, 183, 0.5);
  color: #d1fae5;
  font-weight: 900;
}

.gameweek-list {
  display: grid;
  gap: 10px;
}

.gameweek-row {
  display: grid;
  grid-template-columns: 74px minmax(0, 1fr) 126px 108px 118px;
  gap: 10px;
  align-items: center;
  padding: 12px;
  border-radius: 9px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.22);
}

.gameweek-row strong,
.gameweek-row span {
  text-align: center;
}

.prediction-value {
  color: #fff;
  font-weight: 900;
}

.deadline {
  color: #86efac;
  font-weight: 900;
  font-size: 13px;
}

.deadline.locked {
  color: #fecaca;
}

.prediction-input {
  width: 100%;
  min-height: 38px;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 8px;
  padding: 8px 10px;
  background: rgba(17, 7, 38, 0.72);
  color: #fff;
  text-align: center;
  font: 900 15px 'Segoe UI', Arial, sans-serif;
}

.prediction-input:disabled {
  opacity: 0.58;
}

button {
  min-height: 38px;
  border: 0;
  border-radius: 8px;
  padding: 9px 12px;
  background: linear-gradient(135deg, #8b5cf6, #c4b5fd);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
}

button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
}

.state-text,
.message {
  margin: 0;
  color: #ddd6fe;
  line-height: 1.5;
  text-align: center;
}

.message {
  min-height: 22px;
  margin-top: 10px;
}

.message[data-type="success"] { color: #bbf7d0; }
.message[data-type="error"] { color: #fecaca; }

footer {
  text-align: center;
  padding: 20px;
  color: #d8b4fe;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
}

@media (max-width: 760px) {
  main { padding: 22px 10px 34px; }
  .panel { padding: 14px; }
  .active-card-layout {
    grid-template-columns: 1fr;
  }
  .gameweek-row {
    grid-template-columns: 1fr;
    text-align: center;
  }
  .toolbar a {
    flex: 1;
    text-align: center;
  }
}
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - Game Card</h1>
</header>

<main>
  <div class="toolbar">
    <a data-league-link href="league.html">Back To League Hub</a>
  </div>

  <section class="panel">
    <div data-game-card-content>
      <p class="state-text">Loading active Game Card...</p>
    </div>
    <p class="message" data-game-card-message></p>
  </section>
</main>

<footer>&copy; 2026 Prem Predics | Game Card</footer>

<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/game-card.js"></script>
</body>
</html>
