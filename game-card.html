<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Game Cards</title>
<style>
* { box-sizing: border-box; }

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
}

header {
  padding: 24px 16px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85),
    0 0 24px rgba(124, 58, 237, 0.55);
  margin: 0;
  font-size: clamp(2rem, 5.5vw, 3.35rem);
  line-height: 1.05;
  font-weight: 900;
}

main {
  width: min(1080px, 100%);
  margin: 0 auto;
  padding: 28px 14px 44px;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 900;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 10px 13px;
}

.panel {
  width: 100%;
  background: rgba(46, 16, 102, 0.68);
  border: 2px solid rgba(196, 132, 252, 0.32);
  border-radius: 12px;
  padding: 18px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.28);
}

.round-list {
  display: grid;
  gap: 16px;
}

.game-history-launch,
.game-history-panel {
  display: grid;
  justify-items: center;
  gap: 14px;
  padding: 16px;
  border-radius: 12px;
  background:
    radial-gradient(circle at 50% 0%, rgba(74, 222, 128, 0.12), transparent 38%),
    rgba(17, 7, 38, 0.28);
  border: 1px solid rgba(216, 180, 254, 0.5);
}

.history-toggle-btn,
.history-back-btn {
  min-width: min(260px, 100%);
  background: linear-gradient(135deg, #4c1d95, #7e22ce);
  border: 2px solid rgba(216, 180, 254, 0.5);
  box-shadow: 0 0 18px rgba(124, 58, 237, 0.36);
}

.game-history-helper {
  margin: 0;
  color: #39ff88;
  font-size: clamp(1rem, 2.7vw, 1.35rem);
  font-weight: 950;
  text-align: center;
  line-height: 1.12;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.86),
    1px -1px 0 rgba(0,0,0,0.86),
    -1px 1px 0 rgba(0,0,0,0.86),
    1px 1px 0 rgba(0,0,0,0.86),
    0 0 16px rgba(34, 197, 94, 0.82);
}

.game-history-card-grid {
  width: 100%;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(128px, 1fr));
  gap: 12px;
}

.game-history-card {
  position: relative;
  width: min(140px, 100%);
  aspect-ratio: 0.72;
  justify-self: center;
  display: grid;
  place-items: center;
  padding: 18px 10px 10px;
  border: 3px solid #6ee7b7;
  border-radius: 12px;
  background: linear-gradient(135deg, #052e16 0%, #047857 24%, #10b981 50%, #059669 72%, #a7f3d0 100%);
  color: #fff;
  text-align: center;
  font-size: 0.9rem;
  line-height: 1.06;
  box-shadow: 0 0 20px rgba(110, 231, 183, 0.54), 0 12px 24px rgba(0,0,0,0.32), inset 0 0 14px rgba(255,255,255,0.14);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9);
}

.game-history-card.selected {
  border-color: #fde047;
  box-shadow: 0 0 24px rgba(253, 224, 71, 0.76), 0 12px 24px rgba(0,0,0,0.32), inset 0 0 14px rgba(255,255,255,0.16);
}

.history-range-badge {
  position: absolute;
  top: 7px;
  left: 7px;
  border-radius: 999px;
  padding: 4px 7px;
  background: rgba(17, 7, 38, 0.76);
  border: 1px solid rgba(216, 180, 254, 0.34);
  color: #fde68a;
  font-size: 10px;
  font-weight: 950;
}

.game-history-detail {
  width: 100%;
  display: grid;
  gap: 7px;
  padding: 10px;
  border-radius: 10px;
  background: rgba(17, 7, 38, 0.28);
  border: 1px solid rgba(216, 180, 254, 0.28);
}

.history-result-row {
  display: grid;
  grid-template-columns: minmax(170px, 1fr) 64px repeat(var(--history-week-count), minmax(42px, 54px));
  gap: 7px;
  align-items: center;
  padding: 8px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.48);
}

.history-result-head {
  background: rgba(46, 16, 102, 0.68);
  color: #ddd6fe;
  font-size: 12px;
  font-weight: 950;
  text-align: center;
}

.history-player-cell {
  min-width: 0;
  display: flex;
  align-items: center;
  gap: 8px;
}

.history-player-cell strong {
  min-width: 0;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  color: #fff;
}

.history-avatar {
  width: 34px;
  height: 34px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  overflow: hidden;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.82);
  background: linear-gradient(135deg, #f3e8ff, #a78bfa);
  color: #2e1065;
  font-weight: 950;
}

.history-avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.history-final-rank,
.history-week-rank {
  color: #fff;
  text-align: center;
  font-weight: 950;
}

.history-final-rank.winner {
  color: #facc15;
  text-shadow: 0 0 12px rgba(250, 204, 21, 0.72);
}

.round-panel {
  display: grid;
  gap: 14px;
  padding: 14px;
  border-radius: 10px;
  background: rgba(17, 7, 38, 0.28);
  border: 1px solid rgba(216, 180, 254, 0.22);
}

.round-panel.history {
  opacity: 0.92;
}

.round-label {
  justify-self: center;
  border-radius: 999px;
  padding: 6px 11px;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.26);
  color: #fde68a;
  font-weight: 900;
}

.active-card-layout {
  display: grid;
  grid-template-columns: 170px minmax(0, 1fr);
  gap: 18px;
  align-items: center;
  margin-bottom: 18px;
}

.game-card-visual {
  width: 150px;
  aspect-ratio: 0.72;
  margin: 0 auto;
  display: grid;
  place-items: center;
  padding: 12px;
  border: 3px solid #6ee7b7;
  border-radius: 12px;
  background: linear-gradient(135deg, #052e16 0%, #047857 24%, #10b981 50%, #059669 72%, #a7f3d0 100%);
  color: #fff;
  text-align: center;
  font: 900 1rem 'Segoe UI', Arial, sans-serif;
  font-weight: 900;
  cursor: pointer;
  box-shadow: 0 0 22px rgba(110, 231, 183, 0.62), 0 12px 26px rgba(0,0,0,0.34), inset 0 0 14px rgba(255,255,255,0.14);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9);
  transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}

.game-card-visual:hover,
.game-card-visual:focus-visible {
  border-color: #d9f99d;
  transform: translateY(-2px);
  box-shadow: 0 0 26px rgba(217, 249, 157, 0.72), 0 14px 30px rgba(0,0,0,0.38), inset 0 0 16px rgba(255,255,255,0.18);
  outline: none;
}

.card-copy {
  text-align: center;
  padding: 14px 16px;
  border: 1px solid rgba(216, 180, 254, 0.62);
  border-radius: 12px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.09), transparent 42%),
    rgba(17, 7, 38, 0.2);
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.04);
}

.card-copy h2 {
  margin: 0 0 8px;
  font-size: clamp(1.5rem, 4vw, 2.3rem);
}

.card-copy p {
  margin: 0 0 8px;
  color: #ddd6fe;
  line-height: 1.5;
}

.range-pill {
  display: inline-block;
  margin: 10px 0;
  border-radius: 999px;
  padding: 7px 12px;
  background: rgba(16, 185, 129, 0.18);
  border: 1px solid rgba(110, 231, 183, 0.5);
  color: #d1fae5;
  font-weight: 900;
}

.gameweek-list {
  display: grid;
  gap: 10px;
}

.gameweek-row {
  display: grid;
  grid-template-columns: 66px minmax(120px, 1fr) 128px 112px 28px 98px;
  gap: 10px;
  align-items: center;
  padding: 12px;
  border-radius: 9px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.22);
}

.gameweek-row.current-gameweek {
  border: 2px solid rgba(253, 224, 71, 0.98);
  box-shadow:
    0 0 0 1px rgba(113, 63, 18, 0.22) inset,
    0 0 18px rgba(253, 224, 71, 0.62),
    0 0 34px rgba(250, 204, 21, 0.34);
}

.gameweek-row strong,
.gameweek-row span {
  text-align: center;
}

.gameweek-badge {
  justify-self: center;
  border-radius: 999px;
  padding: 5px 8px;
  background: rgba(17, 7, 38, 0.72);
  border: 1px solid rgba(216, 180, 254, 0.3);
  color: #fde68a;
  font-size: 12px;
  font-weight: 950;
  white-space: nowrap;
}

.prediction-value {
  color: #fff;
  font-weight: 900;
}

.result-value {
  color: #e9d5ff;
  font-size: 13px;
  font-weight: 900;
}

.result-value.pending {
  color: #f5d0fe;
  opacity: 0.82;
}

.save-light {
  justify-self: center;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.48);
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.74), transparent 24%),
    radial-gradient(circle at 50% 52%, #ff385c, #dc143c 62%, #5f071b);
  box-shadow:
    0 0 13px rgba(255, 56, 92, 0.92),
    0 0 22px rgba(248, 113, 113, 0.42),
    inset 0 -3px 6px rgba(0,0,0,0.48);
}

.save-light.saved {
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.74), transparent 24%),
    radial-gradient(circle at 50% 52%, #3dff8c, #16a34a 62%, #052e16);
  box-shadow:
    0 0 13px rgba(61, 255, 140, 0.92),
    0 0 22px rgba(74, 222, 128, 0.42),
    inset 0 -3px 6px rgba(0,0,0,0.48);
}

.deadline {
  color: #86efac;
  font-weight: 900;
  font-size: 13px;
}

.deadline.locked {
  color: #fecaca;
}

.deadline.upcoming {
  color: #ddd6fe;
}

.prediction-input {
  width: 100%;
  min-height: 38px;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 8px;
  padding: 8px 10px;
  background: rgba(17, 7, 38, 0.72);
  color: #fff;
  text-align: center;
  font: 900 15px 'Segoe UI', Arial, sans-serif;
}

.prediction-input:disabled {
  opacity: 0.58;
}

button {
  min-height: 38px;
  border: 0;
  border-radius: 8px;
  padding: 9px 12px;
  background: linear-gradient(135deg, #8b5cf6, #c4b5fd);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
}

button:disabled {
  opacity: 0.55;
  cursor: not-allowed;
  filter: grayscale(0.35);
}

.state-text,
.message {
  margin: 0;
  color: #ddd6fe;
  line-height: 1.5;
  text-align: center;
}

.message {
  min-height: 22px;
  margin-top: 10px;
}

.message[data-type="success"] { color: #bbf7d0; }
.message[data-type="error"] { color: #fecaca; }

.card-modal {
  position: fixed;
  inset: 0;
  z-index: 40;
  display: none;
  place-items: center;
  padding: 24px;
  background: rgba(17, 7, 38, 0.72);
  backdrop-filter: blur(7px);
}

.card-modal.show {
  display: grid;
}

.card-preview-panel {
  width: min(560px, 100%);
  display: grid;
  justify-items: center;
  gap: 16px;
}

.game-card-detail {
  width: min(290px, 76vw);
  aspect-ratio: 0.72;
  display: grid;
  align-content: center;
  gap: 14px;
  padding: 22px 18px;
  border-radius: 16px;
  border: 4px solid #bbf7d0;
  background:
    radial-gradient(circle at 50% 10%, rgba(255,255,255,0.28), transparent 28%),
    linear-gradient(135deg, #031c11 0%, #047857 28%, #10b981 55%, #059669 74%, #d9f99d 100%);
  color: #fff;
  text-align: center;
  box-shadow:
    0 0 34px rgba(187, 247, 208, 0.82),
    0 22px 42px rgba(0,0,0,0.48),
    inset 0 0 18px rgba(255,255,255,0.18);
}

.game-card-detail h2 {
  margin: 0;
  font-size: clamp(1.45rem, 6vw, 2.1rem);
  line-height: 1.05;
  font-weight: 950;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 0 13px rgba(255,255,255,0.28);
}

.game-card-detail p {
  margin: 0;
  color: #f0fdf4;
  font-size: 0.98rem;
  line-height: 1.38;
  font-weight: 800;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.76),
    1px -1px 0 rgba(0,0,0,0.76),
    -1px 1px 0 rgba(0,0,0,0.76),
    1px 1px 0 rgba(0,0,0,0.76);
}

.modal-close {
  min-width: 150px;
  background: linear-gradient(135deg, #4c1d95, #7e22ce);
  box-shadow: 0 0 18px rgba(124, 58, 237, 0.42);
}

footer {
  text-align: center;
  padding: 20px;
  color: #4c1d95;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
}

@media (max-width: 760px) {
  main { padding: 22px 10px 34px; }
  .panel {
    width: 100%;
    padding: 12px;
    margin-inline: auto;
  }
  .round-panel,
  .game-history-launch,
  .game-history-panel {
    width: 100%;
    margin-inline: auto;
  }
  .active-card-layout {
    grid-template-columns: 1fr;
  }
  .gameweek-row {
    grid-template-columns: 42px minmax(54px, 0.8fr) minmax(68px, 1fr) 54px 16px 48px;
    gap: 4px;
    padding: 8px 6px;
    text-align: center;
  }
  .gameweek-badge {
    font-size: 11px;
    padding: 4px 6px;
  }
  .deadline,
  .result-value {
    font-size: 9.4px;
    line-height: 1.08;
  }
  .prediction-input {
    min-height: 30px;
    padding: 5px 6px;
    font-size: 13px;
  }
  .save-light {
    width: 15px;
    height: 15px;
  }
  .gameweek-row button {
    min-height: 30px;
    padding: 5px 4px;
    font-size: 10px;
  }
  .card-modal {
    padding: 18px;
  }
  .game-card-detail {
    width: min(230px, 82vw);
    padding: 18px 14px;
    border-radius: 14px;
  }
  .game-card-detail p {
    font-size: 0.86rem;
  }
  .toolbar a {
    flex: 1;
    text-align: center;
  }
  .game-history-card-grid {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 10px;
  }
  .game-history-card {
    width: min(128px, 100%);
    font-size: 0.78rem;
  }
  .game-history-detail {
    padding: 7px;
    overflow-x: hidden;
  }
  .history-result-row {
    grid-template-columns: minmax(86px, 1fr) 42px repeat(var(--history-week-count), minmax(24px, 32px));
    gap: 3px;
    padding: 6px 4px;
  }
  .history-result-head {
    font-size: 9px;
  }
  .history-avatar {
    width: 26px;
    height: 26px;
  }
  .history-player-cell {
    gap: 5px;
  }
  .history-player-cell strong,
  .history-final-rank,
  .history-week-rank {
    font-size: 10px;
  }
}
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>

<meta name="mobile-web-app-capable" content="yes">

  <h1>Prem Predics - Game Card</h1>

  <div class="toolbar">
    <a data-league-link href="league.html">Back To League Hub</a>

</div>

<footer>2026 Prem Predics | Game Card</footer>
