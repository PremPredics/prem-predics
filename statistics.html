<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Statistics</title>
<style>
* { box-sizing: border-box; }

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #6f45bd 0%, #b579ee 48%, #e7b0ff 100%);
  color: #f3f4f6;
}

header {
  padding: 24px 16px;
  background: linear-gradient(90deg, #6f49bd 0%, #a067d9 52%, #dc9df2 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85),
    0 0 24px rgba(124, 58, 237, 0.55);
  margin: 0;
  font-size: clamp(2rem, 5.5vw, 3.35rem);
  line-height: 1.05;
  font-weight: 900;
}

main {
  width: min(1120px, 100%);
  margin: 0 auto;
  padding: 28px 14px 44px;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 18px;
}

.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 900;
  background: rgba(17, 7, 38, 0.72);
  border: 1px solid rgba(216, 180, 254, 0.32);
  border-radius: 8px;
  padding: 10px 13px;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 14px;
}

.stats-card {
  display: grid;
  gap: 14px;
  padding: 16px;
  border-radius: 12px;
  background: rgba(46, 16, 102, 0.68);
  border: 2px solid rgba(196, 132, 252, 0.32);
  box-shadow: 0 14px 34px rgba(0,0,0,0.28);
}

.player-head {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 12px;
  text-align: center;
}

.avatar {
  width: 62px;
  height: 62px;
  flex: 0 0 auto;
  display: grid;
  place-items: center;
  overflow: hidden;
  border-radius: 50%;
  background: linear-gradient(135deg, #f3e8ff, #a78bfa);
  color: #2e1065;
  border: 2px solid rgba(255,255,255,0.65);
  font-size: 24px;
  font-weight: 900;
}

.avatar img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.player-head h2 {
  margin: 0;
  color: #fff;
  font-size: 1.35rem;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9),
    0 0 10px rgba(255,255,255,0.28);
}

.stat-list {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

.stat {
  min-height: 70px;
  display: grid;
  place-items: center;
  gap: 4px;
  text-align: center;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.44);
  border: 1px solid rgba(216, 180, 254, 0.2);
  padding: 8px;
}

.stat span {
  color: #ddd6fe;
  font-size: 12px;
  font-weight: 900;
}

.stat-label {
  display: grid;
  place-items: center;
  gap: 4px;
  line-height: 1.15;
}

.stat-icons {
  min-height: 18px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
}

.symbol {
  display: inline-grid;
  place-items: center;
  width: 17px;
  height: 17px;
  line-height: 1;
  font-size: 14px;
  font-weight: 900;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.75),
    1px -1px 0 rgba(0,0,0,0.75),
    -1px 1px 0 rgba(0,0,0,0.75),
    1px 1px 0 rgba(0,0,0,0.75);
}

.symbol.tick-green { color: #22c55e; }
.symbol.tick-amber { color: #f59e0b; }
.symbol.star { color: #fde047; }
.symbol.ball { color: #f8fafc; }
.symbol.target { color: #67e8f9; }

.symbol.card {
  width: 12px;
  height: 16px;
  border-radius: 2px;
  border: 1px solid rgba(255,255,255,0.7);
  box-shadow: 0 1px 4px rgba(0,0,0,0.38);
}

.symbol.card.yellow { background: #facc15; }
.symbol.card.red { background: #ef4444; }

.stat.uc-stat .stat-label {
  color: #fde68a;
  font-size: 13px;
}

.stat.uc-stat .stat-label > span:last-child {
  color: #fde68a;
}

.stat.gold-stat .stat-label {
  color: #fde68a;
}

.stat.gold-stat .stat-label > span:last-child {
  color: #fde68a;
}

.stat.green-stat .stat-label {
  color: #86efac;
}

.stat.green-stat .stat-label > span:last-child {
  color: #86efac;
}

.stat strong {
  color: #fff;
  font-size: 1.45rem;
  line-height: 1;
}

.stat.uc-stat strong {
  color: #fde68a;
  font-size: 1.65rem;
}

.stat.game-won-stat {
  grid-column: 1 / -1;
  width: min(240px, 100%);
  justify-self: center;
}

.empty {
  margin: 0;
  padding: 28px 16px;
  text-align: center;
  color: #ddd6fe;
}

footer {
  text-align: center;
  padding: 20px;
  color: #d8b4fe;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
}

@media (max-width: 640px) {
  main { padding: 22px 10px 34px; }
  .toolbar a { flex: 1; text-align: center; }
  .stats-grid { grid-template-columns: 1fr; }
}
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - Statistics</h1>
</header>

<main>
  <div class="toolbar">
    <a data-league-link href="league.html">Back To League Hub</a>
  </div>

  <section class="stats-grid" data-stats-grid>
    <p class="empty">Loading statistics...</p>
  </section>
</main>

<footer>&copy; 2026 Prem Predics | Statistics</footer>

<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/statistics.js"></script>
</body>
</html>
