<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - League Hub</title>
<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #4c1d95, #7c3aed, #1e0f3d);
  color: #f3f4f6;
}

header {
  padding: 25px 20px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85),
    0 0 24px rgba(124, 58, 237, 0.55);
  margin: 0;
  font-size: clamp(2rem, 5.5vw, 3.35rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

main {
  width: min(1240px, 100%);
  margin: 0 auto;
  padding: 32px 18px 48px;
}

.toolbar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 800;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 10px 13px;
}

.league-panel {
  background: rgba(46, 16, 102, 0.66);
  border: 2px solid rgba(196, 132, 252, 0.32);
  border-radius: 12px;
  padding: 22px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.28);
}

.league-summary {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(220px, 0.62fr) minmax(150px, auto);
  gap: 16px;
  align-items: center;
  margin-bottom: 22px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(216, 180, 254, 0.24);
}

.league-summary h2 {
  margin: 0 0 8px;
  color: #fff;
  -webkit-text-stroke: 1px #05010c;
  text-shadow:
    -1px -1px 0 #05010c,
    1px -1px 0 #05010c,
    -1px 1px 0 #05010c,
    1px 1px 0 #05010c,
    0 0 10px rgba(216, 180, 254, 0.82);
  font-size: clamp(1.8rem, 5vw, 2.65rem);
  line-height: 1.05;
  font-weight: 900;
  text-align: center;
}

.league-summary p {
  margin: 0;
  color: #ddd6fe;
  line-height: 1.5;
}

.gameweek-card {
  min-height: 68px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: nowrap;
  padding: 14px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.46);
  border: 1px solid rgba(216, 180, 254, 0.24);
  text-align: center;
  white-space: nowrap;
}

.gameweek-card span {
  color: #ddd6fe;
  font-size: 13px;
  font-weight: 800;
}

.gameweek-card strong {
  color: #fff;
  font-size: clamp(1rem, 2.3vw, 1.45rem);
  line-height: 1.1;
}

.join-code {
  min-width: 150px;
  text-align: right;
}

.join-code span {
  display: block;
  color: #ddd6fe;
  font-size: 13px;
}

.join-code strong {
  display: block;
  margin-top: 4px;
  font-size: 20px;
  letter-spacing: 0;
}

.copy-code-btn {
  margin-top: 8px;
  border: 0;
  border-radius: 999px;
  padding: 7px 12px;
  background: linear-gradient(135deg, #facc15, #f59e0b);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.88),
    1px -1px 0 rgba(0,0,0,0.88),
    -1px 1px 0 rgba(0,0,0,0.88),
    1px 1px 0 rgba(0,0,0,0.88);
  box-shadow: 0 0 14px rgba(250, 204, 21, 0.34);
}

.play-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 14px;
}

.play-card {
  min-height: 112px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  padding: 18px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.48);
  border: 1px solid rgba(216, 180, 254, 0.24);
  color: #fff;
  text-decoration: none;
  text-align: center;
  box-shadow: 0 8px 18px rgba(0,0,0,0.22);
}

.play-card:hover {
  background: rgba(124, 58, 237, 0.46);
  transform: translateY(-2px);
}

.play-card strong {
  font-size: 18px;
}

.play-card span {
  color: #ddd6fe;
  line-height: 1.35;
}

.state-text {
  margin: 0;
  color: #ddd6fe;
  line-height: 1.5;
}

footer {
  text-align: center;
  padding: 20px;
  color: #d8b4fe;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
}

@media (max-width: 650px) {
  header {
    padding: 18px 14px;
  }

  main {
    padding: 22px 12px 36px;
  }

  .league-summary {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .gameweek-card {
    padding: 12px 10px;
    gap: 7px;
  }

  .gameweek-card span {
    font-size: 12px;
  }

  .gameweek-card strong {
    font-size: clamp(0.92rem, 4.5vw, 1.15rem);
  }

  .toolbar a {
    text-align: center;
  }

  .join-code {
    text-align: center;
  }
}
</style>
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - League Hub</h1>
</header>

<main>
  <div class="toolbar">
    <a href="index.html">Back To Home</a>
    <a href="leagues.html">Back To Leagues</a>
  </div>

  <section class="league-panel">
    <div class="league-summary">
      <div>
        <h2 data-league-name>Loading league...</h2>
      </div>
      <div class="gameweek-card">
        <span data-gameweek-label>Checking gameweek...</span>
        <strong data-gameweek-countdown>--d --h --m --s</strong>
      </div>
      <div class="join-code">
        <span>Join code</span>
        <strong data-join-code>...</strong>
        <button class="copy-code-btn" type="button" data-copy-join-code>Copy</button>
      </div>
    </div>

    <nav class="play-grid" data-play-grid aria-label="Private league pages"></nav>
  </section>
</main>

<footer>&copy; 2026 Prem Predics | Private League</footer>

<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/league.js"></script>
</body>
</html>
