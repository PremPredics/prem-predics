<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - League Hub</title>
<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #4c1d95, #7c3aed, #1e0f3d);
  color: #f3f4f6;
}

header {
  padding: 25px 20px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.5px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85),
    0 0 24px rgba(124, 58, 237, 0.55);
  margin: 0;
  font-size: clamp(2rem, 5.5vw, 3.35rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

main {
  width: min(1240px, 100%);
  margin: 0 auto;
  padding: 32px 18px 48px;
}

.toolbar {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}

.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 800;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 10px 13px;
}

.league-panel {
  background: rgba(46, 16, 102, 0.66);
  border: 2px solid rgba(196, 132, 252, 0.32);
  border-radius: 12px;
  padding: 22px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.28);
}

.league-summary {
  display: grid;
  grid-template-columns: minmax(0, 1fr) minmax(260px, 0.75fr) minmax(170px, 0.45fr);
  gap: 16px;
  align-items: center;
  margin-bottom: 22px;
  padding-bottom: 18px;
  border-bottom: 1px solid rgba(216, 180, 254, 0.24);
}

.league-summary h2 {
  margin: 0 0 6px;
  color: #fff;
  -webkit-text-stroke: 0;
  text-shadow:
    -1px -1px 0 #05010c,
    1px -1px 0 #05010c,
    -1px 1px 0 #05010c,
    1px 1px 0 #05010c,
    0 0 10px rgba(216, 180, 254, 0.82);
  font-size: clamp(1.8rem, 5vw, 2.65rem);
  line-height: 1.05;
  font-weight: 900;
  text-align: center;
}

.league-members-count {
  margin: 0;
  color: #ddd6fe;
  font-size: 14px;
  font-weight: 900;
  text-align: center;
}

.league-summary p {
  margin: 0;
  color: #ddd6fe;
  line-height: 1.5;
}

.gameweek-card {
  min-height: 68px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  flex-wrap: nowrap;
  padding: 14px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.46);
  border: 1px solid rgba(216, 180, 254, 0.24);
  text-align: center;
  white-space: nowrap;
}

.gameweek-card span {
  color: #ddd6fe;
  font-size: 13px;
  font-weight: 800;
}

.gameweek-card strong {
  color: #fff;
  font-size: clamp(1rem, 2.3vw, 1.45rem);
  line-height: 1.1;
}

.join-code {
  min-width: 170px;
  display: grid;
  justify-items: center;
  gap: 5px;
  text-align: center;
  padding: 12px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.34);
  border: 1px solid rgba(216, 180, 254, 0.2);
}

.join-code span {
  display: block;
  color: #ddd6fe;
  font-size: 13px;
}

.join-code strong {
  display: block;
  margin-top: 0;
  font-size: 20px;
  letter-spacing: 0;
}

.deadline-strip {
  display: grid;
  grid-template-columns: repeat(3, minmax(180px, 1fr));
  gap: 12px;
  margin: 0 0 20px;
}

.deadline-card {
  display: grid;
  gap: 4px;
  min-height: 70px;
  align-content: center;
  padding: 13px 14px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.42);
  border: 1px solid rgba(216, 180, 254, 0.22);
  text-align: center;
}

.deadline-card span {
  color: #fff;
  font-size: 12px;
  font-weight: 900;
  text-transform: uppercase;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.82),
    1px -1px 0 rgba(0,0,0,0.82),
    -1px 1px 0 rgba(0,0,0,0.82),
    1px 1px 0 rgba(0,0,0,0.82);
}

.deadline-card strong {
  color: #19ff7a;
  font-size: 15px;
  text-shadow: 0 0 10px rgba(34, 255, 136, 0.5);
}

.deadline-card.locked strong {
  color: #ff3b3b;
  text-shadow: 0 0 10px rgba(255, 59, 59, 0.5);
}

.copy-code-btn {
  margin-top: 8px;
  border: 0;
  border-radius: 999px;
  padding: 7px 12px;
  background: linear-gradient(135deg, #facc15, #f59e0b);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.88),
    1px -1px 0 rgba(0,0,0,0.88),
    -1px 1px 0 rgba(0,0,0,0.88),
    1px 1px 0 rgba(0,0,0,0.88);
  box-shadow: 0 0 14px rgba(250, 204, 21, 0.34);
}

.play-grid {
  display: grid;
  gap: 16px;
}

.play-group {
  display: grid;
  gap: 14px;
}

.play-group.primary {
  grid-template-columns: repeat(2, minmax(220px, 1fr));
}

.play-group.game {
  grid-template-columns: repeat(3, minmax(180px, 1fr));
}

.play-group.reference {
  grid-template-columns: repeat(3, minmax(180px, 1fr));
}

.play-card {
  --accent: #facc15;
  min-height: 124px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  gap: 8px;
  padding: 20px 18px;
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(255,255,255,0.08), transparent 34%),
    linear-gradient(135deg, rgba(13, 8, 31, 0.92), rgba(48, 18, 88, 0.88));
  border: 1px solid color-mix(in srgb, var(--accent) 55%, rgba(255,255,255,0.18));
  color: #fff;
  text-decoration: none;
  text-align: center;
  position: relative;
  overflow: hidden;
  box-shadow: 0 12px 24px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.1);
  transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}

.play-card::before {
  content: '';
  position: absolute;
  inset: 0 auto 0 0;
  width: 7px;
  background: linear-gradient(180deg, var(--accent), rgba(255,255,255,0.85));
  box-shadow: 0 0 18px color-mix(in srgb, var(--accent) 70%, transparent);
}

.play-card::after {
  content: '';
  position: absolute;
  width: 86px;
  height: 86px;
  right: -30px;
  top: -32px;
  border: 1px solid color-mix(in srgb, var(--accent) 48%, transparent);
  transform: rotate(18deg);
  opacity: 0.34;
}

.play-card:hover {
  transform: translateY(-2px);
  border-color: var(--accent);
  box-shadow: 0 16px 30px rgba(0,0,0,0.34), 0 0 18px color-mix(in srgb, var(--accent) 32%, transparent);
}

.play-card strong {
  font-size: 23px;
  letter-spacing: 0;
  font-weight: 950;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.85),
    1px -1px 0 rgba(0,0,0,0.85),
    -1px 1px 0 rgba(0,0,0,0.85),
    1px 1px 0 rgba(0,0,0,0.85),
    0 0 10px color-mix(in srgb, var(--accent) 48%, transparent);
  position: relative;
  z-index: 1;
}

.play-card span {
  color: #f5f3ff;
  line-height: 1.35;
  position: relative;
  z-index: 1;
}

.state-text {
  margin: 0;
  color: #ddd6fe;
  line-height: 1.5;
}

footer {
  text-align: center;
  padding: 20px;
  color: #d8b4fe;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
}

@media (max-width: 650px) {
  header {
    padding: 18px 14px;
  }

  header h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }

  main {
    padding: 22px 12px 36px;
  }

  .league-summary {
    grid-template-columns: 1fr;
    text-align: center;
  }

  .gameweek-card {
    padding: 12px 10px;
    gap: 7px;
  }

  .gameweek-card span {
    font-size: 12px;
  }

  .gameweek-card strong {
    font-size: clamp(0.92rem, 4.5vw, 1.15rem);
  }

  .toolbar a {
    text-align: center;
  }

  .toolbar {
    display: grid;
    grid-template-columns: 1fr 1fr;
  }

  .toolbar a[data-profile-link] {
    grid-column: 1 / -1;
    order: -1;
  }

  .join-code {
    text-align: center;
  }

  .deadline-strip {
    grid-template-columns: 1fr;
    gap: 9px;
  }

  .play-group.primary,
  .play-group.game,
  .play-group.reference {
    grid-template-columns: 1fr;
  }

  .play-card {
    min-height: 96px;
    padding: 16px 14px;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - League Hub</h1>
</header>

<main>
  <div class="toolbar">
    <a href="index.html">Back To Home</a>
    <a href="leagues.html">Back To Leagues</a>
    <a href="profile.html" data-profile-link>Edit Profile</a>
  </div>

  <section class="league-panel">
    <div class="league-summary">
      <div>
        <h2 data-league-name>Loading league...</h2>
        <p class="league-members-count" data-member-count></p>
      </div>
      <div class="gameweek-card">
        <span data-gameweek-label>Checking gameweek...</span>
        <strong data-gameweek-countdown>--d --h --m --s</strong>
      </div>
      <div class="join-code">
        <span>Join code</span>
        <strong data-join-code>...</strong>
        <button class="copy-code-btn" type="button" data-copy-join-code>Copy</button>
      </div>
    </div>

    <div class="deadline-strip" data-deadline-strip></div>

    <nav class="play-grid" data-play-grid aria-label="Private league pages"></nav>
  </section>
</main>

<footer>&copy; 2026 Prem Predics | Private League</footer>

<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/league.js"></script>
</body>
</html>
