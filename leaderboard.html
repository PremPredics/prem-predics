<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
<style>
body {
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #4c1d95, #7c3aed, #1e0f3d);
  color: #f3f4f6;
  margin: 0;
  padding: 0;
  text-align: center;
}

header {
  padding: 20px;
  background: linear-gradient(90deg, #7c3aed, #a78bfa);
  color: #f3e8ff;
  font-size: 28px;
  font-weight: bold;
}

.image-container {
  display: flex;
  flex-direction: column;
  align-items: center;
  margin-top: 20px;
}

.image-container img {
  max-width: 80%;
  border: 4px solid #a78bfa;
  border-radius: 12px;
}

footer {
  margin-top: 50px;
  padding: 20px;
  border-top: 1px solid #a78bfa;
  color: #d8b4fe;
}

/* Back Button Styling */
.back-btn {
  padding: 12px 24px;
  font-size: 16px;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  background: #7c3aed;
  color: white;
  box-shadow: 0 4px 8px rgba(0,0,0,0.3);
  transition: 0.3s;
  margin-top: 20px;
}

.back-btn:hover {
  background: #a78bfa;
  transform: translateY(-2px);
}

.back-btn:active {
  transform: translateY(1px);
}
</style>
</head>
<body>

<header>Leaderboard</header>

<!-- Image and Back Button Container -->
<div class="image-container">
  <img src="leaderboard.png" alt="Leaderboard">
  <button class="back-btn" onclick="location.href='index.html'">← Back to Homepage</button>
</div>

<footer>&copy; 2026 Prem Predics | Leaderboard</footer>

</body>
</html>
