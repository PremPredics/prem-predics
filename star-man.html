<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Star Man</title>
<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
}

header {
  padding: 20px 14px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.42);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.4px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85);
  margin: 0;
  font-size: clamp(1.9rem, 5vw, 3rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

main {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 18px 14px 34px;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.toolbar a {
  min-height: 38px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 800;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 9px 12px;
  text-align: center;
  white-space: nowrap;
}

.toolbar a.star-back-link {
  color: #fff;
  background: linear-gradient(135deg, #b45309, #facc15);
  border-color: rgba(254, 240, 138, 0.82);
  box-shadow: 0 0 14px rgba(250, 204, 21, 0.32);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.72),
    1px -1px 0 rgba(0,0,0,0.72),
    -1px 1px 0 rgba(0,0,0,0.72),
    1px 1px 0 rgba(0,0,0,0.72);
}

.panel {
  background:
    linear-gradient(135deg, rgba(76, 29, 149, 0.78), rgba(46, 16, 102, 0.68) 48%, rgba(17, 7, 38, 0.58)),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.16), transparent 34%);
  border: 2px solid rgba(216, 180, 254, 0.42);
  border-radius: 10px;
  padding: 18px;
  box-shadow: 0 16px 36px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.12);
}

.star-man-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.65fr) minmax(280px, 0.85fr);
  gap: 14px;
  align-items: stretch;
}

.history-panel {
  min-height: 220px;
  height: 100%;
  display: flex;
  flex-direction: column;
  background:
    linear-gradient(135deg, rgba(46, 16, 102, 0.74), rgba(17, 7, 38, 0.58)),
    radial-gradient(circle at 50% 0%, rgba(253, 230, 138, 0.12), transparent 38%);
  border: 2px solid rgba(216, 180, 254, 0.38);
  border-radius: 10px;
  padding: 18px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.26);
  text-align: center;
}

.history-panel h2 {
  margin: 0 0 12px;
  color: #fff;
  font-size: clamp(1.25rem, 3vw, 1.65rem);
  line-height: 1.1;
}

.history-list {
  display: grid;
  align-content: start;
  gap: 8px;
  flex: 1;
}

.history-card-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 10px;
}

.history-star-card {
  position: relative;
  min-height: 176px;
  aspect-ratio: 0.72;
  display: block;
  overflow: hidden;
  border: 2px solid #f8d568;
  border-radius: 13px;
  background:
    radial-gradient(circle at 20% 14%, rgba(255,255,255,0.34), transparent 18%),
    radial-gradient(circle at 82% 88%, rgba(255,255,255,0.24), transparent 22%),
    linear-gradient(135deg, #5f3905 0%, #b7790e 14%, #ffe9a3 29%, #d69e18 44%, #fff5c4 61%, #b7790e 76%, #7a4d09 100%);
  box-shadow:
    0 0 17px rgba(248, 213, 104, 0.52),
    0 9px 18px rgba(0,0,0,0.32),
    inset 0 0 16px rgba(255,255,255,0.18);
}

.history-star-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    linear-gradient(42deg, rgba(255,255,255,0.18) 0 12%, transparent 12% 28%, rgba(255,255,255,0.12) 28% 40%, transparent 40% 100%),
    radial-gradient(circle at 50% 96%, rgba(255,255,255,0.18), transparent 34%);
  pointer-events: none;
  z-index: 4;
}

.history-gw-badge {
  position: absolute;
  z-index: 7;
  top: 7px;
  left: 7px;
  border-radius: 999px;
  padding: 3px 7px;
  background: rgba(17, 7, 38, 0.78);
  border: 1px solid rgba(216, 180, 254, 0.36);
  color: #fde68a;
  font-size: 10px;
  font-weight: 950;
  line-height: 1;
}

.history-star-name {
  position: absolute;
  z-index: 6;
  top: 27px;
  left: 7px;
  right: 7px;
  min-height: 34px;
  display: grid;
  place-items: center;
  color: #fff;
  font-size: clamp(0.66rem, 1.05vw, 0.78rem);
  font-weight: 950;
  line-height: 1.02;
  text-align: center;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.98),
    1px -1px 0 rgba(0,0,0,0.98),
    -1px 1px 0 rgba(0,0,0,0.98),
    1px 1px 0 rgba(0,0,0,0.98);
}

.history-star-card .player-card-photo-frame {
  left: 9px;
  right: 9px;
  top: 65px;
  bottom: 34px;
  border-radius: 9px;
}

.history-star-card .player-card-flag-image,
.history-star-card .player-card-flag-fallback {
  width: min(78px, 72%);
  font-size: 1.25rem;
}

.history-star-card .player-card-country {
  max-width: 94%;
  padding: 3px 6px;
  font-size: 0.54rem;
}

.history-star-team {
  position: absolute;
  z-index: 6;
  left: 7px;
  right: 7px;
  bottom: 8px;
  border-radius: 999px;
  padding: 3px 6px;
  background: rgba(68, 38, 4, 0.82);
  border: 1px solid rgba(255, 255, 255, 0.34);
  color: #fff7d6;
  font-size: 0.58rem;
  font-weight: 950;
  line-height: 1.02;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.72),
    1px -1px 0 rgba(0,0,0,0.72),
    -1px 1px 0 rgba(0,0,0,0.72),
    1px 1px 0 rgba(0,0,0,0.72);
}

.history-pager {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 10px;
  margin-top: 2px;
}

.history-pager button {
  width: 38px;
  min-height: 34px;
  border: 0;
  border-radius: 999px;
  background: linear-gradient(135deg, #4c1d95, #7e22ce);
  color: #fff;
  font-weight: 950;
  cursor: pointer;
  box-shadow: 0 0 12px rgba(124, 58, 237, 0.38);
}

.history-pager button:disabled {
  opacity: 0.42;
  cursor: not-allowed;
}

.history-pager span {
  color: #fde68a;
  font-size: 0.82rem;
  font-weight: 950;
}

.history-row {
  display: grid;
  gap: 3px;
  padding: 10px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.42);
  border: 1px solid rgba(216, 180, 254, 0.24);
  text-align: center;
}

.history-row strong {
  color: #fde68a;
}

.history-row span {
  color: #fff;
  font-weight: 900;
}

.history-row small {
  color: #ddd6fe;
  font-weight: 800;
}

.page-head {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 14px;
  margin-bottom: 16px;
  text-align: center;
}

.page-head > div:first-child {
  flex: 1;
}

.page-head h2 {
  margin: 0 0 8px;
  font-size: clamp(1.75rem, 4.4vw, 2.65rem);
  text-align: center;
  color: #fff;
  font-weight: 950;
  line-height: 1.04;
  text-shadow:
    -2px -2px 0 rgba(0,0,0,0.95),
    2px -2px 0 rgba(0,0,0,0.95),
    -2px 2px 0 rgba(0,0,0,0.95),
    2px 2px 0 rgba(0,0,0,0.95),
    0 0 18px rgba(216, 180, 254, 0.86),
    0 0 28px rgba(250, 204, 21, 0.24);
}

.state-text,
.message {
  color: #ddd6fe;
  line-height: 1.45;
  margin: 0;
  text-align: center;
}

.message.saved-flash {
  color: #86efac;
  font-weight: 950;
  animation: starSavedFade 3s ease forwards;
  text-shadow: 0 0 12px rgba(34, 197, 94, 0.62);
}

@keyframes starSavedFade {
  0%, 70% { opacity: 1; }
  100% { opacity: 0; }
}

.lock-note {
  display: block;
  margin-top: 4px;
}

.restrictions {
  min-width: 220px;
  max-width: 370px;
  padding: 12px 12px 13px;
  border-radius: 10px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.18), transparent 42%),
    linear-gradient(100deg, rgba(7, 89, 133, 0.78) 0%, rgba(14, 165, 233, 0.62) 48%, rgba(127, 29, 29, 0.66) 52%, rgba(225, 29, 72, 0.76) 100%);
  border: 2px solid rgba(255, 255, 255, 0.46);
  text-align: center;
  display: grid;
  gap: 8px;
  align-content: start;
  box-shadow:
    0 0 24px rgba(56, 189, 248, 0.22),
    0 0 24px rgba(248, 113, 113, 0.18),
    inset 0 1px 0 rgba(255,255,255,0.22);
  position: relative;
}

.star-pick-status-light {
  display: block;
  justify-self: center;
  margin: 0 auto 2px;
  width: 18px;
  height: 18px;
  border-radius: 999px;
  border: 1px solid rgba(255,255,255,0.58);
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.76), transparent 24%),
    radial-gradient(circle at 50% 52%, #ff385c, #dc143c 62%, #5f071b);
  box-shadow:
    0 0 13px rgba(255, 56, 92, 0.92),
    0 0 22px rgba(248, 113, 113, 0.44),
    inset 0 -3px 6px rgba(0,0,0,0.48);
}

.star-pick-status-light.saved {
  background:
    radial-gradient(circle at 34% 28%, rgba(255,255,255,0.76), transparent 24%),
    radial-gradient(circle at 50% 52%, #3dff8c, #16a34a 62%, #052e16);
  box-shadow:
    0 0 13px rgba(61, 255, 140, 0.94),
    0 0 22px rgba(74, 222, 128, 0.44),
    inset 0 -3px 6px rgba(0,0,0,0.48);
}

.restrictions strong {
  display: grid;
  gap: 8px;
  margin-bottom: 1px;
  color: #fff;
  font-size: 1rem;
  line-height: 1;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 16px rgba(255,255,255,0.42);
}

.restrictions strong::after {
  content: '';
  display: block;
  width: 100%;
  height: 2px;
  border-radius: 999px;
  background: linear-gradient(90deg, rgba(186, 230, 253, 0.3), rgba(255,255,255,0.95), rgba(254, 202, 202, 0.3));
  box-shadow: 0 0 10px rgba(255,255,255,0.34);
}

.restriction-summary {
  display: grid;
  gap: 8px;
}

.restriction-summary .state-text {
  margin: 0;
}

.star-effect-buttons {
  display: flex;
  align-items: stretch;
  justify-content: center;
  gap: 8px;
  flex-wrap: wrap;
}

.star-effect-button {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border: 0;
  background: transparent;
  color: #fff;
  font-weight: 950;
  cursor: pointer;
  text-align: center;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95);
}

.star-effect-button span {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border-radius: 999px;
  border: 2px solid rgba(255,255,255,0.92);
  font-size: 20px;
  line-height: 1;
  box-shadow: 0 0 15px rgba(255,255,255,0.24), inset 0 0 9px rgba(255,255,255,0.18);
}

.star-effect-button.power-card span {
  background: linear-gradient(135deg, #075985, #0284c7 54%, #7dd3fc);
  box-shadow: 0 0 16px rgba(14, 165, 233, 0.68), inset 0 0 9px rgba(255,255,255,0.18);
}

.star-effect-button.super-card span {
  background:
    radial-gradient(circle at 34% 24%, rgba(255,255,255,0.78), transparent 24%),
    linear-gradient(135deg, #92400e, #f59e0b 46%, #facc15 72%, #fef3c7);
  box-shadow: 0 0 18px rgba(250, 204, 21, 0.78), inset 0 0 10px rgba(255,255,255,0.24);
}

.star-effect-button.curse-card span {
  background: linear-gradient(135deg, #7f1d1d, #ef4444 54%, #fb7185);
  box-shadow: 0 0 16px rgba(239, 68, 68, 0.68), inset 0 0 9px rgba(255,255,255,0.18);
}

.star-effect-button:hover {
  transform: translateY(-1px);
  filter: brightness(1.08);
}

.no-effects {
  color: #fff;
  font-size: 0.86rem;
  font-weight: 850;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.78),
    1px -1px 0 rgba(0,0,0,0.78),
    -1px 1px 0 rgba(0,0,0,0.78),
    1px 1px 0 rgba(0,0,0,0.78);
}

.pick-grid {
  display: grid;
  gap: 14px;
}

.pick-card {
  display: grid;
  gap: 10px;
  padding: 16px;
  border-radius: 10px;
  background:
    linear-gradient(135deg, rgba(17, 7, 38, 0.64), rgba(46, 16, 102, 0.38)),
    radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.12), transparent 42%);
  border: 1px solid rgba(125, 211, 252, 0.34);
  text-align: center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
}

.pick-card[hidden] {
  display: none;
}

.pick-card h3 {
  margin: 0;
  font-size: 20px;
  color: #fef3c7;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 12px rgba(250, 204, 21, 0.46);
}

.available-player-counter {
  width: min(100%, 460px);
  justify-self: center;
  display: grid;
  gap: 2px;
  margin: 6px auto 4px;
  padding: 8px 11px;
  border: 1px solid rgba(125, 211, 252, 0.48);
  border-radius: 10px;
  background:
    radial-gradient(circle at 20% 18%, rgba(255,255,255,0.12), transparent 24%),
    linear-gradient(135deg, rgba(17, 7, 38, 0.72), rgba(46, 16, 102, 0.56));
  color: #fff;
  font: inherit;
  cursor: pointer;
  box-shadow: 0 0 14px rgba(125, 211, 252, 0.16), inset 0 0 12px rgba(255,255,255,0.08);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.9),
    1px -1px 0 rgba(0,0,0,0.9),
    -1px 1px 0 rgba(0,0,0,0.9),
    1px 1px 0 rgba(0,0,0,0.9);
}

.available-player-counter[hidden] {
  display: none;
}

.available-player-counter strong {
  color: #fff;
  font-size: clamp(12px, 2vw, 15px);
  font-weight: 950;
  line-height: 1.05;
}

.available-player-counter span {
  color: #bae6fd;
  font-size: clamp(10px, 1.5vw, 12px);
  font-weight: 900;
  line-height: 1.05;
}

.available-player-counter:disabled,
.available-player-counter[aria-disabled="true"] {
  cursor: default;
  opacity: 0.78;
  border-color: rgba(216, 180, 254, 0.42);
  background:
    linear-gradient(135deg, rgba(46, 16, 101, 0.5), rgba(17, 7, 38, 0.56)),
    radial-gradient(circle at 50% 0%, rgba(216, 180, 254, 0.16), transparent 60%);
}

label {
  color: #ddd6fe;
  font-weight: 800;
  text-align: center;
}

input {
  width: 100%;
  min-height: 42px;
  margin-top: 7px;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 8px;
  padding: 10px 12px;
  background: rgba(17, 7, 38, 0.72);
  color: #fff;
  font: inherit;
}

input:focus {
  outline: none;
  border-color: rgba(125, 211, 252, 0.82);
  box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.18), 0 0 18px rgba(34, 211, 238, 0.22);
}

input:disabled {
  cursor: not-allowed;
  opacity: 0.7;
  color: #ddd6fe;
  background: rgba(30, 12, 64, 0.68);
  border-color: rgba(216, 180, 254, 0.22);
}

.results {
  display: grid;
  gap: 6px;
}

.results.player-card-results {
  grid-template-columns: repeat(auto-fit, minmax(126px, 154px));
  justify-content: center;
  gap: 12px;
  padding-top: 2px;
}

.result-button {
  width: 100%;
  min-height: 40px;
  border: 1px solid rgba(216, 180, 254, 0.24);
  border-radius: 8px;
  padding: 9px 10px;
  background: rgba(255,255,255,0.09);
  color: #fff;
  text-align: center;
  font-weight: 800;
  cursor: pointer;
}

.result-button:not(:disabled):hover {
  border-color: rgba(125, 211, 252, 0.7);
  background: rgba(14, 165, 233, 0.18);
}

.result-button span {
  display: block;
  color: #ddd6fe;
  font-size: 12px;
  font-weight: 700;
  margin-top: 2px;
}

.result-button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.player-result-card {
  width: 100%;
  aspect-ratio: 0.7;
  min-height: 180px;
  position: relative;
  display: block;
  border: 2px solid #f8d568;
  border-radius: 12px;
  padding: 0;
  overflow: hidden;
  cursor: pointer;
  background:
    radial-gradient(circle at 20% 14%, rgba(255,255,255,0.34), transparent 18%),
    radial-gradient(circle at 82% 88%, rgba(255,255,255,0.24), transparent 22%),
    linear-gradient(135deg, #5f3905 0%, #b7790e 14%, #ffe9a3 29%, #d69e18 44%, #fff5c4 61%, #b7790e 76%, #7a4d09 100%);
  box-shadow:
    0 0 20px rgba(248, 213, 104, 0.56),
    0 10px 22px rgba(0,0,0,0.34),
    inset 0 0 18px rgba(255,255,255,0.22);
  transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
}

.player-result-card::after,
.selected-player-card::after,
.player-preview-card::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    linear-gradient(42deg, rgba(255,255,255,0.2) 0 12%, transparent 12% 28%, rgba(255,255,255,0.13) 28% 40%, transparent 40% 100%),
    radial-gradient(circle at 50% 96%, rgba(255,255,255,0.2), transparent 34%);
  pointer-events: none;
  z-index: 4;
}

.player-result-card:not(:disabled):hover {
  transform: translateY(-3px) scale(1.02);
  box-shadow:
    0 0 26px rgba(248, 213, 104, 0.82),
    0 14px 28px rgba(0,0,0,0.42),
    inset 0 0 20px rgba(255,255,255,0.26);
}

.player-result-card:disabled {
  cursor: not-allowed;
  filter: grayscale(0.65);
  opacity: 0.62;
}

.player-card-name {
  position: absolute;
  z-index: 5;
  top: 8px;
  left: 7px;
  right: 7px;
  min-height: 32px;
  padding: 3px 4px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: #fff;
  font-size: clamp(0.72rem, 1.4vw, 0.86rem);
  font-weight: 950;
  line-height: 1.02;
  text-align: center;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.98),
    1px -1px 0 rgba(0,0,0,0.98),
    -1px 1px 0 rgba(0,0,0,0.98),
    1px 1px 0 rgba(0,0,0,0.98),
    0 0 12px rgba(255,255,255,0.42);
  background: linear-gradient(180deg, rgba(92, 55, 7, 0.5), rgba(92, 55, 7, 0.08));
  border-radius: 8px;
}

.player-card-photo-frame {
  position: absolute;
  z-index: 2;
  left: 8px;
  right: 8px;
  top: 48px;
  bottom: 42px;
  display: grid;
  place-items: center;
  border-radius: 10px;
  overflow: hidden;
  background:
    radial-gradient(circle at 50% 28%, rgba(255,255,255,0.28), transparent 32%),
    linear-gradient(180deg, rgba(76, 29, 149, 0.2), rgba(46, 16, 102, 0.48));
  box-shadow: inset 0 0 18px rgba(76, 29, 149, 0.36);
}

.flag-card-visual {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 8px;
