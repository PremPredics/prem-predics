<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prem Predics - Star Man</title>
<style>
* {
  box-sizing: border-box;
}

body {
  min-height: 100vh;
  margin: 0;
  font-family: 'Segoe UI', Arial, sans-serif;
  background: linear-gradient(135deg, #7b61d8 0%, #a98cf0 52%, #d3c4ff 100%);
  color: #f3f4f6;
}

header {
  padding: 20px 14px;
  background: linear-gradient(90deg, #7354ca 0%, #9677e2 54%, #bda9f5 100%);
  box-shadow: 0 8px 20px rgba(0,0,0,0.42);
}

header h1 {
  text-align: center;
  color: #fff;
  -webkit-text-stroke: 1.4px #05010c;
  text-shadow:
    -2px -2px 0 #05010c,
    2px -2px 0 #05010c,
    -2px 2px 0 #05010c,
    2px 2px 0 #05010c,
    0 0 12px rgba(216, 180, 254, 0.85);
  margin: 0;
  font-size: clamp(1.9rem, 5vw, 3rem);
  line-height: 1.05;
  font-weight: 900;
  letter-spacing: 0;
}

main {
  width: min(1180px, 100%);
  margin: 0 auto;
  padding: 18px 14px 34px;
}

.toolbar {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-bottom: 14px;
  flex-wrap: wrap;
}

.toolbar a {
  color: #f3e8ff;
  text-decoration: none;
  font-weight: 800;
  background: rgba(17, 7, 38, 0.68);
  border: 1px solid rgba(216, 180, 254, 0.28);
  border-radius: 8px;
  padding: 9px 12px;
}

.panel {
  background:
    linear-gradient(135deg, rgba(76, 29, 149, 0.78), rgba(46, 16, 102, 0.68) 48%, rgba(17, 7, 38, 0.58)),
    radial-gradient(circle at 50% 0%, rgba(255,255,255,0.16), transparent 34%);
  border: 2px solid rgba(216, 180, 254, 0.42);
  border-radius: 10px;
  padding: 18px;
  box-shadow: 0 16px 36px rgba(0,0,0,0.28), inset 0 1px 0 rgba(255,255,255,0.12);
}

.star-man-layout {
  display: grid;
  grid-template-columns: minmax(0, 1.65fr) minmax(280px, 0.85fr);
  gap: 14px;
  align-items: stretch;
}

.history-panel {
  min-height: 220px;
  height: 100%;
  display: flex;
  flex-direction: column;
  background:
    linear-gradient(135deg, rgba(46, 16, 102, 0.74), rgba(17, 7, 38, 0.58)),
    radial-gradient(circle at 50% 0%, rgba(253, 230, 138, 0.12), transparent 38%);
  border: 2px solid rgba(216, 180, 254, 0.38);
  border-radius: 10px;
  padding: 18px;
  box-shadow: 0 12px 28px rgba(0,0,0,0.26);
  text-align: center;
}

.history-panel h2 {
  margin: 0 0 12px;
  color: #fff;
  font-size: clamp(1.25rem, 3vw, 1.65rem);
  line-height: 1.1;
}

.history-list {
  display: grid;
  align-content: start;
  gap: 8px;
  flex: 1;
}

.history-row {
  display: grid;
  gap: 3px;
  padding: 10px;
  border-radius: 8px;
  background: rgba(17, 7, 38, 0.42);
  border: 1px solid rgba(216, 180, 254, 0.24);
  text-align: center;
}

.history-row strong {
  color: #fde68a;
}

.history-row span {
  color: #fff;
  font-weight: 900;
}

.history-row small {
  color: #ddd6fe;
  font-weight: 800;
}

.page-head {
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: 14px;
  margin-bottom: 16px;
  text-align: center;
}

.page-head > div:first-child {
  flex: 1;
}

.page-head h2 {
  margin: 0 0 6px;
  font-size: clamp(1.4rem, 3.5vw, 2rem);
  text-align: center;
  color: #fff;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 16px rgba(216, 180, 254, 0.74);
}

.state-text,
.message {
  color: #ddd6fe;
  line-height: 1.45;
  margin: 0;
  text-align: center;
}

.lock-note {
  display: block;
  margin-top: 4px;
}

.restrictions {
  min-width: 220px;
  max-width: 370px;
  padding: 12px;
  border-radius: 8px;
  background:
    linear-gradient(135deg, rgba(69, 10, 10, 0.56), rgba(17, 7, 38, 0.58)),
    radial-gradient(circle at 50% 0%, rgba(248, 113, 113, 0.18), transparent 45%);
  border: 1px solid rgba(248, 113, 113, 0.36);
  text-align: center;
  display: grid;
  gap: 8px;
  align-content: start;
}

.restrictions strong {
  display: block;
  margin-bottom: 5px;
  color: #ff2626;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 14px rgba(248, 38, 38, 0.8);
}

.restriction-summary {
  display: grid;
  gap: 9px;
}

.restriction-summary .state-text {
  margin: 0;
}

.restriction-cards {
  display: grid;
  gap: 8px;
}

.restriction-card-button {
  width: 100%;
  min-height: 74px;
  display: grid;
  place-items: center;
  border-radius: 12px;
  padding: 10px;
  border: 2px solid #fb7185;
  background:
    radial-gradient(circle at 30% 24%, rgba(255,255,255,0.2), transparent 26%),
    linear-gradient(135deg, #4c0519 0%, #991b1b 28%, #ef4444 54%, #be123c 74%, #fecaca 100%);
  color: #fff;
  font-weight: 950;
  line-height: 1.08;
  cursor: pointer;
  text-align: center;
  box-shadow: 0 0 18px rgba(251, 113, 133, 0.46), inset 0 0 14px rgba(255,255,255,0.14);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95);
}

.restriction-card-button:hover {
  transform: translateY(-1px);
  box-shadow: 0 0 24px rgba(251, 113, 133, 0.62), inset 0 0 14px rgba(255,255,255,0.18);
}

.pick-grid {
  display: grid;
  gap: 14px;
}

.pick-card {
  display: grid;
  gap: 10px;
  padding: 16px;
  border-radius: 10px;
  background:
    linear-gradient(135deg, rgba(17, 7, 38, 0.64), rgba(46, 16, 102, 0.38)),
    radial-gradient(circle at 50% 0%, rgba(34, 211, 238, 0.12), transparent 42%);
  border: 1px solid rgba(125, 211, 252, 0.34);
  text-align: center;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.12);
}

.pick-card[hidden] {
  display: none;
}

.pick-card h3 {
  margin: 0;
  font-size: 20px;
  color: #fef3c7;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95),
    0 0 12px rgba(250, 204, 21, 0.46);
}

label {
  color: #ddd6fe;
  font-weight: 800;
  text-align: center;
}

input {
  width: 100%;
  min-height: 42px;
  margin-top: 7px;
  border: 1px solid rgba(216, 180, 254, 0.42);
  border-radius: 8px;
  padding: 10px 12px;
  background: rgba(17, 7, 38, 0.72);
  color: #fff;
  font: inherit;
}

input:focus {
  outline: none;
  border-color: rgba(125, 211, 252, 0.82);
  box-shadow: 0 0 0 3px rgba(34, 211, 238, 0.18), 0 0 18px rgba(34, 211, 238, 0.22);
}

.results {
  display: grid;
  gap: 6px;
}

.result-button {
  width: 100%;
  min-height: 40px;
  border: 1px solid rgba(216, 180, 254, 0.24);
  border-radius: 8px;
  padding: 9px 10px;
  background: rgba(255,255,255,0.09);
  color: #fff;
  text-align: center;
  font-weight: 800;
  cursor: pointer;
}

.result-button:not(:disabled):hover {
  border-color: rgba(125, 211, 252, 0.7);
  background: rgba(14, 165, 233, 0.18);
}

.result-button span {
  display: block;
  color: #ddd6fe;
  font-size: 12px;
  font-weight: 700;
  margin-top: 2px;
}

.result-button:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

.selected-player {
  min-height: 22px;
  color: #bbf7d0;
  font-weight: 800;
}

.message {
  min-height: 24px;
  margin-top: 10px;
}

.message[data-type="success"] {
  color: #bbf7d0;
}

.message[data-type="error"] {
  color: #fecaca;
}

button.save {
  min-height: 42px;
  border: 0;
  border-radius: 8px;
  padding: 10px 14px;
  background: linear-gradient(135deg, #8b5cf6, #c4b5fd);
  color: #fff;
  font-weight: 900;
  cursor: pointer;
}

.star-curse-modal {
  position: fixed;
  inset: 0;
  display: none;
  place-items: center;
  padding: 20px 20px 86px;
  background: rgba(8, 3, 20, 0.54);
  backdrop-filter: blur(8px);
  z-index: 1000;
}

.star-curse-modal.show {
  display: grid;
}

body.card-modal-open {
  overflow: hidden;
}

.star-curse-panel {
  width: min(330px, 100%);
  height: min(430px, calc(100vh - 116px));
  min-height: 0;
  display: flex;
  flex-direction: column;
  border-radius: 18px;
  padding: 24px 20px;
  text-align: center;
  border: 3px solid #fb7185;
  background: linear-gradient(135deg, #4c0519 0%, #991b1b 24%, #ef4444 50%, #be123c 72%, #fecaca 100%);
  box-shadow: 0 0 30px rgba(251, 113, 133, 0.68), 0 20px 60px rgba(0,0,0,0.8), inset 0 0 22px rgba(255,255,255,0.16);
  color: #fff;
  position: relative;
  overflow: visible;
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.92),
    1px -1px 0 rgba(0,0,0,0.92),
    -1px 1px 0 rgba(0,0,0,0.92),
    1px 1px 0 rgba(0,0,0,0.92),
    0 2px 5px rgba(0,0,0,0.78);
}

.star-curse-panel::after {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: inherit;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 28%),
    linear-gradient(42deg, rgba(255,255,255,0.12) 0 12%, transparent 12% 27%, rgba(255,255,255,0.09) 27% 38%, transparent 38% 100%);
  pointer-events: none;
}

.star-curse-panel h2,
.star-curse-panel p,
.star-curse-panel small {
  position: relative;
  z-index: 1;
}

.star-curse-panel h2 {
  min-height: 0;
  flex: 0 0 22%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  padding: 0 2px 8px;
  font-size: clamp(1.18rem, 2.6vw, 1.46rem);
  line-height: 1.18;
}

.star-curse-panel p {
  flex: 1 1 68%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0;
  color: #fff;
  font-size: clamp(0.78rem, 1.45vw, 0.95rem);
  font-weight: 850;
  line-height: 1.35;
  overflow-y: auto;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}

.star-curse-panel small {
  color: #fff;
  font-weight: 950;
}

.star-curse-back {
  position: absolute;
  left: 50%;
  bottom: -62px;
  transform: translateX(-50%);
  width: min(220px, 100%);
  min-height: 42px;
  border: 0;
  border-radius: 12px;
  padding: 10px 16px;
  background: linear-gradient(135deg, #7f1d1d, #ef4444);
  color: #fff;
  font-weight: 950;
  cursor: pointer;
  border: 3px solid rgba(254, 202, 202, 0.98);
  z-index: 2;
  box-shadow: 0 12px 30px rgba(127, 29, 29, 0.64), 0 0 30px rgba(248, 113, 113, 0.5);
  text-shadow:
    -1px -1px 0 rgba(0,0,0,0.95),
    1px -1px 0 rgba(0,0,0,0.95),
    -1px 1px 0 rgba(0,0,0,0.95),
    1px 1px 0 rgba(0,0,0,0.95);
}

button.save:disabled {
  cursor: not-allowed;
  opacity: 0.55;
}

footer {
  text-align: center;
  padding: 16px;
  color: #4c1d95;
  border-top: 1px solid rgba(167, 139, 250, 0.3);
  font-size: 13px;
}

@media (max-width: 720px) {
  main {
    padding: 12px 10px 28px;
  }

  .toolbar {
    justify-content: center;
  }

  .toolbar a {
    flex: 1 1 auto;
    text-align: center;
  }

  .page-head {
    display: grid;
    text-align: center;
  }

  .restrictions {
    max-width: none;
  }

  .toolbar a {
    text-align: center;
  }

  .star-man-layout {
    grid-template-columns: 1fr;
  }
}
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.75);
    font-size: clamp(1.55rem, 8vw, 2.2rem);
    line-height: 1.12;
  }
}

/* mobile-title-one-line */
@media (max-width: 650px) {
  header h1,
  body > h1 {
    -webkit-text-stroke: 0 !important;
    text-shadow:
      -1px -1px 0 #05010c,
      1px -1px 0 #05010c,
      -1px 1px 0 #05010c,
      1px 1px 0 #05010c,
      0 0 10px rgba(216, 180, 254, 0.72) !important;
    font-size: 1.32rem !important;
    line-height: 1.05 !important;
    white-space: nowrap !important;
    letter-spacing: 0 !important;
  }
}
</style>
</head>
<body data-require-auth="true" data-require-league="true">
<header>
  <h1>Prem Predics - Star Man</h1>
</header>

<main>
  <div class="toolbar">
    <a data-league-back href="leagues.html">Back To League Hub</a>
  </div>

  <div class="star-man-layout">
    <section class="panel">
      <div class="page-head">
        <div>
          <h2 data-league-title>Loading Star Man...</h2>
          <p class="state-text" data-gameweek-summary>Checking gameweek and card effects.</p>
        </div>
        <div class="restrictions">
          <strong>Restrictions</strong>
          <div class="restriction-summary" data-restriction-summary>
            <p class="state-text">Loading...</p>
          </div>
        </div>
      </div>

      <div class="pick-grid">
        <section class="pick-card" data-pick-slot="primary">
          <h3>Star Man</h3>
          <label>
            Start typing a player name
            <input data-player-search="primary" autocomplete="off" placeholder="Search player">
          </label>
          <div class="selected-player" data-selected-player="primary"></div>
          <div class="results" data-search-results="primary"></div>
          <button class="save" type="button" data-save-star-man="primary" disabled>Save Star Man</button>
          <p class="message" data-message="primary"></p>
        </section>

        <section class="pick-card" data-pick-slot="super_duo" hidden>
          <h3>Super Duo</h3>
          <label>
            Start typing a second player name
            <input data-player-search="super_duo" autocomplete="off" placeholder="Search second player">
          </label>
          <div class="selected-player" data-selected-player="super_duo"></div>
          <div class="results" data-search-results="super_duo"></div>
          <button class="save" type="button" data-save-star-man="super_duo" disabled>Save Super Duo</button>
          <p class="message" data-message="super_duo"></p>
        </section>
      </div>
    </section>

    <aside class="history-panel">
      <h2>History Of Star Man Picks</h2>
      <div class="history-list" data-star-man-history>
      </div>
    </aside>
  </div>
</main>

<div class="star-curse-modal" data-star-curse-modal aria-hidden="true">
  <article class="star-curse-panel" role="dialog" aria-modal="true" aria-label="Active Star Man curse">
    <h2 data-star-curse-title>Curse Card</h2>
    <p data-star-curse-description></p>
    <small data-star-curse-player></small>
    <button class="star-curse-back" type="button" data-close-star-curse>Back</button>
  </article>
</div>

<footer>&copy; 2026 Prem Predics | Star Man</footer>

<script type="module" src="assets/js/site-auth.js"></script>
<script type="module" src="assets/js/star-man.js"></script>
</body>
</html>
